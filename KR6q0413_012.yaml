body:
  text: 侍者廣熙錄瑞鹿法孫行信編次偈贈雲松和尚且喜柴門對竹開綠陰終日覆蒼苔從教夏熱炎如火到底無能入得來寄宗始兄法門寥落冷如灰爾已休心我已頹山住總忘人世夢自閒閒地自徘徊寄大田兄獨坐山關懶世酬蕭然不覺幾時秋法門此際難為也聊把枯茅且蓋頭示越峰關主見得分明識得他莫貪水草臥煙霞直須倒嶽傾湫去始露宗門利爪牙示重目禪人離亂韶光弘道難眾緣相逼不身閑數載精勤方休歇卻被休心趁出山示嘯石禪人大用無用用現前信手拈來覆大千點開上古金剛眼炤澈今時天外天示無瑕禪人終日談禪口不開不開口處可疑猜忽然看破開口處謾云千里賺吾來示一魚禪人個事分明本現成何勞特地向他尋從教事事無心去眨眼由來隔幾層示彰甫徐居士但自無心塵不染開談句句占機先子能善具超方眼我與袈裟搭半肩贈張玉可居士善真墨未濡時面目真纔形半點更精神誌公閃爍難為筆老衲那伽豈易臨萬里碧空惟朗月一天虛皓絕纖雲從來此處無人見子與僧繇寫得親姚子謙居士為先君懷泉公徵放生河偈聞說生兮思惘然勿云何處覓因緣從前誤出鳶魚話以後相隨亥豕傳活潑自忘萍跡遠機關豈到蓼花邊哲人幻去恩波外獨有觀河見不遷示不遷勤侍者禪家萬事俱拋去潑天作略一時來山僧切囑宜相信不信吾言任子猜示應元長老六十年來老比丘形容幸與我同流山門體段須謹慎仔細而今多事秋示僧官道生僧中宰相俗中僧二諦融通悟未曾顧問也無三昧法腰間不墜愧盧能示渠演監院老來無事可干懷一榻高眠萬念灰入定久已忘出定童子敲門喚不回示映輝知客山僧從不解欺心吐膽傾肝說向人擬問西來何意旨向道眉毛眼上橫示輥石侍者宗主拈提貴正眼陞堂聚眾令雙行禪門此際惟知解徹底掀翻第一人示石愚書記蓬壁寥寥接水涯野雲無住即為家經行飯罷山前遶亂石橋虹燕子斜示心白維那禪翁何事到山家拾得松芽且當茶問我西來無抵對攜籃圃外採藤花示吉中知藏不是嶺頭傳底事豈從雞足付將來老僧一語告吾子終日談禪口不開示渠梵書記謝世飄然繫短蓬半肩破衲斷麻縫有人問我西來意笑指庭前雙徑松示宇寬知客丈室蕭然竹數椽門前流水是清漣老僧心地常如此論物還他事不遷示卻塵悅眾不煩著意打重關但得心閒物自閒一味卻塵塵亦了茅苫一片伴青山示溪舌悅眾溪邊黃葉隨流水流去無心趁落花舉目望來長舌所返觀總屬道人家示瀰昌知事存心一處細心窮窮到無心始合宗不是老僧來道磅焉能整作舊家風示仁哲知事仁慈皆育物事理盡雙彰古哲無他法菩提心歇狂示體瑩貼案體遍虛空界瑩光映十方分明都說了莫謂我囊藏示德彰道人大德化兮小德川曾聞斷臂乞心安我今高報諸仁者但得心堅石也穿示懋芳耆舊衲僧氣宇絕遮攔禪道是非俱不攀為甚超然渾不顧皆因打透那重關寄體印老宿久埋寶鏡不當軒包括先天與後天日食三食高枕臥鼻頭焉著用繩牽示愚道人即請主枯木逢春花未開花開要等個人來南華嶺畔重為望月上三更坐釣臺懷張嶧老食了松華又食槐門前不見故人來遙膽樹影疑君至拽杖遶山走幾回示玉寰張居士法諱坤青山綠綠如相似萬里程途跋涉來他日逢君今日始倒拖拄杖上天台讚徑山大慧杲讚牙如劍樹口似血盆呵罵諸方不近人情罹難一十八載且喜致之無聞比今脅肩諂笑者慚惶殺人洞山价祖讚寶鏡三昧印心過水睹影打徹臨終來去自由吾今常于此切黃梅五祖忍讚面如滿月具四十齒周家繼女所生世謂無父之子肉身千載鎮黃梅為甚又教衣缽止咄佛日石雨老和尚像讚叢林九住道振八山若論向上揭過一班咄舉世有眼人皆見若個男兒用手攀覺非沈居士像讚為國柱石力護吾宗儒釋并拈心空法空其形蒼古其音黃鐘學貫今古惟一老翁惟一別號懷泉姚居士像讚滅之曰隱生之曰微生滅滅已名曰道基達道逍遙是阿誰檇李懷泉老古錐高念祖居士松菊叢中拈拂坐石小像讚穎墨未濡一真獨放纔形朕兆便落比量即此離此妙觀儼焉念祖模樣天縱體用雙彰顯現拂子頭上自讚雪山濟請這個漢出頭早信口呵罵諸方討得許多煩惱不管是之與非一味只是掀倒野犴驚走無門獅兒聞之碎腦有時直截根源有時盤桓落草費盡一片婆心深嘆無人知好又若水華長老請山僧做底事諸方做不到非但玄中玄亦且妙中妙少者授年尊見聞俱笑倒舉世所不信父少而子老又越峰敬請面容自覺年將半眉端唯有法門愁踏遍諸方無可意得子吾心已罷休又錢鳳溪居士請胸襟海闊無涯拽杖東走西走更問如何若何便棒不容開口這般慶快是誰密印堂上老朽又河南府王大士張啟聖二居士請荊棘叢中駐足是非堆裏安身隨方開堂說法到處攪亂叢林世人或憎或愛龍天且喜且欣禪者扣其捷要直心一味披襟生辰岡岡四九海內聞汝臭名不管是非得失拽杖驀直前行將謂硬鋼打就似乎生鐵鑄成拈來拋向河南府點開時人的眼睛又重目維那請者個漢真倔強坐若獅猊行若象談禪不動唇皮應機橫棒豎棒與麼鹵莽接諸方如何做得人榜樣又雲心祥請假既不住詎可立真真假不住分付雲心又無瑕禪人請叢林東住西住拄杖南打北打恁麼不順人情只要時人放下更問放下如何良久云哪又離塵本請像不像三十棒留與後人作榜樣咄是何形狀又裕之滌西堂請這漢作事十聞九怕動手便打動口便罵為甚用此辣鉗錘秪要時人盡放下而今要報這冤仇短短麻繩長空掛又智柏容後堂請法道浙東行遍意思更往西遊願力如山似海異乎淺見之流子若描渠供養切勿效彼之尤咦本色住山為活計一把蓬茅且蓋頭又巨平止請一有多種二無兩般咄懸起了也急著眼看又鶴林茂侍者請三玄三要齊拈卻那許其中話正偏定隱門下真消息貴在當人接上肩又自如原禪人請親近山僧數十秋也無歡樂也無憂洞上一枝無孔笛分付原禪老實頭又可敬請浙地開堂數十秋談禪說道水長流此行拽杖曹溪去端坐從容伴帝侯又必成尊菴主請這漢拈提向上事從來不肯鼓唇皮或問其間何意旨只貴當人自絕疑又應期錢居士請願力如山重胸襟似海深慣吹無孔笛大休珠道人又心白西堂請這個老禿口快心直法嗣遍布江楚不怕法門狼籍胸懷馬祖遺風要付八十之一不懼諸方所呵住在曹溪山窟作略潑地潑天棒人棒得骨出更有末後句子分付宗禪心白咦又樂然公請一生討便宜不解看文墨轉看轉繁轉跋碌胸中徒爾多堆塞出言吐語不驚人如何教人為法則吾家有個善超方十二時中如癡兀又慕賢公請老休做人極條直高拱手兮低作揖佛法會也得世法會也得高下隨宜爭定他水銀墮地無蹤跡又義成公請一生搜索之極揀人痛處下針知我者百病百愈不知者番作生嗔極寬極恕極仁便是大休道人不動聲色坐振叢林現主曹溪法席海內個個遍聞放出調羹之手內外如水之平時逢像季人多鬥爭法門振作借重老僧又若虛公請讚了一軸又一軸大休如何有許多尋常語話來搪塞大家靜坐薩婆訶又僧官道生請家無四壁八面玲瓏是非不到處形跡杳無蹤閑挑野菜和根煮猶讓山家老禿儂又茂芳公請說大又不大說休又不休有時隨宜上下法道處處周流咄又天濟公請果是法門中龍象極肯低頭極謙讓不三不四好為人不是機呵便是棒又體印公請牙爪俱備事理兼通坐象王山下振六祖家風這是何人像曹溪大休翁又應元公請檢點人之短處便請捨短從長恐子不知長短我為橫量豎量喝一喝云長多少良久云劍號巨闕珠稱夜光又寶航公請古云平常心是道試問當人薦未曾悟了尚要除悟跡三玄三要不須爭又渠演監院請這個漢真奇特一條白棒到處狼籍人來問著答云不識藏頭露尾作白拈賊行道五郡不肯休息潛行密用令人難測渠演上座莫受他惑掉在屋角頭邊免得時人邈模又映輝知客請佛祖之冤對法門禍害頭聞名較些子相見沒來繇自讚自罵這老漢世世還同佛祖儔又宇寬知客請無心說法有口談空是這般人堪繼此宗又心照首座請胸襟海闊願力弘深一條拄杖不近人情隨方說法報上皇恩雖然橫說豎說從來不曾動唇八不思議三昧便是大休道人又敬止禪人請機用臨時辨得親一喝何妨三轉身若還不會山僧話懸在高堂問此真又體中直歲請這老漢雙眼圓明慣要雷轟電捲又要盤桓葛藤電捲時偷心頓歇盤桓時追人腳跟驗到諦當處偽自不藏真又致中公請自喜還自讚這個休和尚細察於秋毫大包虛空量仔細又思量還有一處長巨細俱不管隨緣而放曠涉世無心心亦無閑坐曲碌木床上又洞玄副寺請這漢做事令人疑謗參知識四十餘個個當人不讓早早出世人前一味胡揮亂棒氣宇凜烈蓋諸方不管尊卑及長上一切從頭按下來如何做得人榜樣索性實告諸仁者誌公不是閑和尚又伴月副寺請行藏不拘出入無束應現千差將錯就錯高下隨宜不定宗如何教人能摸索又澄心書記請千叮萬囑別無他只貴當人遇作家句下翻身須領略曹源一滴灌天涯又解脫典座請這漢做人極謙下不喜愚夫自莊大爾要莊腔我不然送到天王腳底下動手就要打開口就要罵或肯一念自知非從前惡習都放下爾也心休我也罷流通正在今朝話又吉中知藏請這個和尚人天榜樣眼空四海胸中浩蕩願力弘深不肯休想受付囑靈山上又渠梵侍者請這老漢真古怪雲門拾得死貓頭持來兩廣街上賣東也請開堂西也請說戒一生跋碌不停留想是欠了閻浮債又輥石侍者請不似僧兮不似俗曹溪山裡休老禿眼目高兮胸襟闊不是熙兒難湊泊知我言兮繼我宗他日逢人謾拈出又達玄侍請不住無兮不住有活潑潑兮如珠走不啻象王背上行還要跨下獅子吼又三洗侍者請既來求我讚豈可太謙讓一尺說一尺一丈還一丈行道五七郡橫身江湖上九坐道場心不休更要以疏聞皇上收拾海內的珠璣送入龍宮鎮寶藏行藏古怪是何人曹溪山裡休和尚又曇宣禪人請個呵師固難測量可形跡難覓寬不處於太虛窄不處於毫跡一生熱腸太過人人攀仰無極或曰法門之禍根或曰法門之柱石一味道心付人被人呵為老賊子得我之真髓切莫似我狼籍咦又熙和禪人請出世為導師不是小兒戲上報四重恩下將三有濟可笑面南人聚眾爭閑氣不若三家村裏翁也有仁也有義不覺說到這裡我也替你慚愧又道開禪人請作事不假為法心真得法數十餘載每每坐到五更煆得形同槁木為報佛祖深恩若不直心直說誰人知我苦心告報來學仔細法門擔子不輕又止水禪人請順之喜名為讚逆之嗔名為謗當知毀讚不同途順逆依然成兩樣我以正眼看將來都緣好與三十棒又卻塵禪人請作獅子吼百獸潛藏為人天樣個個驚慌英風凜烈逼人寒真個末劫大宗匠又客生禪人請突出無位真人且道作麼描摸一個紙上形容驚動粵東僧俗裱者畫者各勞其力個個欣然莊香點燭行道曾經數往還攜帶人天造大福又格新禪人請不讀詩書滿腹文章不參禪道堪繼後芳法門擔子甚重勉力一肩承當或問大休何所長這裡就是真榜樣又月輝禪人請胸中曠闊無遮擋若不深知謂我狂便是而今這等說自家好處自家揚又每文庫頭請慣搜法門人短大家竭力支撐放出包空之量勿有爾我之爭不見浮山遠代付投子青密地思量真可法令我特地向南尋又客新禪人請人曰再來大鑑我今只日大休盡道應身說法我亦不知來繇又行海禪人請不是老漢饒舌要捄法門狼籍不諳中道行太過太不及太過不付一人不及付到百十這則淆訛公案當來再問彌勒咄又密宗禪人請這漢辨才無礙所為胸中梗直時人作用不似渠只為此中多委曲又行果禪人請熟處要人忘生處要人熟最惱傳衣付法人鎮日忙忙讀語錄定不修緣不熟勉強出來呈醜拙題自己讚罵諸方禿冷地一念自慚惶水邊林下保養足又舒周禪人請上不得師之扶下不得徒之助一根中心樹子大海波心直柱觸破龍宮海藏七珍八寶露布禪者扣問有何能即此就是真常住又瞻翠禪人請自喜這漢一處好發願弘法弘到老不是靈山莂記來怎肯全身入荒草又有餘庫頭請這個倔強漢迥出於常流不比諸方老禿牛一日對鏡三梳頭又自省禪人請細如秋末大如山過了重關又一關山僧智向極猛烈幾翻悟後幾翻參又遠塵禪人請分明拈出時人不識畢竟如何拄杖三十又可宗庵主請四壁無門處處通從教八面得相逢拈槌豎佛多年也不識誰人契此宗又張鎮臺法名德崑請步長松石下居曹溪山巔侍六祖之側伴五千狂禪不動聲色內外如然攜後昆手接佛祖肩婆婆和和似禪非禪飢來喫飯困來打眠夷老僧只麼閒閒地夢想渾忘兜率天又蘿庵王居士請婆婆和和說禪說道是耶非耶少與草料不喜落平常豈肯存玄妙佛祖位中尚不留埋頭曹溪深山嶴愈要潛形眾要追老休定作眾生靠又無住莫居士請這個老禿真宗門容文又不通字又不識橫扯豎扯卻又去得仔細思量有些奇特
