body:
  text: 侍者德滿録瑞鹿法孫行信編次入院日總憲存憶唐公同衆護法暨本寺勤舊請上堂師升座祝聖拈香畢維那白椎竟乃云天得一以清地得一以寧君王得一治天下大夫得一燮理乾坤衲僧得一收放縱橫風以時雨以時萬彙霑榮是天地之一也舉賢才薄稅斂萬民歡而天下樂不動干戈自太平是君王之一也不忘靈山付囑永作法海金湯生生為柱石世世作津梁此是唐大夫之一也如何是衲僧之一山僧有時拈頭作尾有時拈尾作頭頭尾無拘其則須知收放自由縱橫無礙收起時鬼神難測放開時葛藤遍滿豎拂云葛藤樁子豎起也前廊後架也是葛藤東西方丈也是葛藤佛殿山門也是葛藤十字街頭也是葛藤使其若佛若祖若智若愚若天人阿修羅地獄餓鬼六道四生一個個踢腳絆手跌倒爬起云和尚唐府請你上堂為甚麼有這許多葛藤山僧即向他道密印多年古道場佛法無人為舉揚而今四衆焚香請謾將葛藤作商量商量即且置且道為甚麼人舉揚復豎拂子云俞任袁柳酆鮑史唐擊拂子下座結制上堂結結解解無他事豎拂子云秪要諸人會這個擲拂子云而今撒向階前也試問還曾薦得麼僧出衆禮拜起師打云三個孩兒抱花鼓莫來攔我毬門路下座佛日老和尚送法衣至上堂高峰出身處密印古道場佛法疏來久無人為舉揚遂舉袈裟角云舉也舉也放下袈裟角揮拂一拂云揚也揚也放下拂子云借問諸兄作麼生會古今不異當年事不妨拈出大家知下座上堂三百禪和二百洲無繩自縛萬山頭若能言外知端的鞭起泥牛下海游大衆端的還知否脫或未知達磨西來原無意妄想狂心歇便休擲拂子下座圓戒上堂師拈如意云若論那邊事說佛說祖不可得止持作犯不可得山僧說底不可得諸人聽底不可得曷用鳴鐘擂鼓集衆升堂正眼觀來合喫拄杖此棒當山僧代喫衆大德分中又作麼生若教將錯還就錯日用毋令毫髮差下座南潯董氏法名德熏為薦先母顧氏孺人請上堂生是死之生死是生之死生死與去來豎拂子云總不出於此若向這裡會得方知顧氏孺人生而不曾生滅而未常滅不生不滅識根源始信山僧真實說作麼說麻三斤乾屎橛擲拂下座師誕日上堂叢林秋晚實堪悲百丈清規孰護持拂子頭邊如不薦衲衣下事復吾欺遂豎拂子云還薦得也未象田先師來也現今在山僧拂子頭上為諸人葛藤云天也如是地也如是山也如是水也如是見今請主也如是珠上座說的也如是諸闍黎聽的也如是山僧則拔劍攪龍門當仁不讓師只向他天也不如是地也不如是山也不如是水也不如是見今請主也不如是珠上座說的也不如是衆闍黎聽的也不如是畢竟如何拂拂子云不是不是僧問拂子頭邊即不問吾師壽量事如何師云拂子頭邊薦取進云恁麼則清風敲竹韻紅日綴花梢師云衲衣下事如何僧禮拜師云也非分外下座佛日老和尚訃音至上堂一生岣嶁頭今朝驀直去合掌微笑休日照山河麗大衆且道這老漢向甚麼處去了咦東家作驢西家作馬要騎便騎要下便下付雪山濟禪人上堂雪山問如何是曹洞宗師云腦後見腮莫與往來進云恁麼則超出言相外不落有無機師云子既親薦得須知我不私雪禮拜云也要大衆證明師乃云山僧布個漫天網子意欲撈摝滄海錦鱗使其一個個大者大成小者小就今日蛟龍出現也擲拂子云佛祖大事親相付作浪興波任汝為下座解制上堂僧問如何是出門一句師云看腳下乃云去即印住住即印破不去不住二俱有過大衆作麼生免得此過良久云四維上下絶遮攔東西南北無回互下座結制示衆師云真獅出窟吼林間絶野干若是獅子兒請出來相見衆默然師云只此就是礙膺不盡所以臨機用不著了也山僧此番結制不比尋常各各將自己從前眼裡見底耳裡聞底心裡記底盡情放下將放下又放下放到無放處大家摸索看若摸索不著參落堂示衆山僧作事狂卻被無明障僧也三十棒俗也三十棒從頭至尾打將來秪為婆心而放曠究竟底事意如何各各眉毛橫眼上示衆師云洞上知識此時多唯有山僧第一拙不會長四與短三動動就是乾屎橛驀拈拄杖云雲門大師來也且作麼生會若也會得方許你具隻眼居士問何是佛意師云拄杖橫擔不顧人進云如何是祖意師云直入千峰萬峰去進云如何是和尚意師云奈山僧無意士禮拜師呵呵大笑元旦示衆年新月新日新四方八面開門南山貍奴白牯恭賀無位真人大衆無位真人在甚麼處衆下語不契師下座連揖云年年相見歲歲相逢頌古五祖至碓坊見六祖腰石舂米乃問曰米熟也未六祖曰米熟已久猶缺篩在五祖擊碓三下而去能會祖意三鼓入室五祖以袈裟遮圍不令人見囑云流布將來無令斷絶頌云一法無為萬法親相傳只貴有知音黃梅消息今猶在擊碓三更上祖燈祖示惠明曰不思善不思惡云云頌云不思善不思惡人人到此難摸索村裡婆婆不著鞋未到人前先露腳本來無一物何處惹塵埃頌云一滴水潑天波五百高僧沒奈何謾云祖師不識字且道其中有甚麼不是風動不是幡動仁者心動頌云昨夜得個黃粱夢四顧山光一點空末劫比丘間戲論又云幡動又云風永嘉玄覺禪師參遂繞座三匝振錫而立祖曰夫沙門具三千威儀八萬細行大德自何方來生大我慢覺曰生死事大無常迅速祖曰何不體取無生了無速乎覺曰體即無生了本無速祖曰如是如是頌云釣竿直墜萬重波豈肯輕輕放過他體即無生生亦了曹溪路上有人過世尊升座文殊白椎頌云無端平地起干戈猶是將身入賊窩劈面一椎成粉碎至今分散滿娑婆翠巖令參禪師上堂曰今夏與諸兄弟東語西話看取翠巖眉毛在麼長慶云生也雲門云關頌云發言必須心無怯行事當知理要長擬動唇皮先墮意觀來也是錯商量香林因僧問如何是衲衣下事師曰臘月火燒山頌云陌面人傳家裡信聽得分明說不清及至歸家問端的忘卻從前寄信人石門徹禪師因僧問如何教外別傳一句徹曰東村王老夜燒錢頌云東村王老夜燒錢月映長江水映天野老不知何處去翻身依舊枕頭邊玄沙三種病人頌云玄沙三種病人話個段光明夜不收天曉依然還一樣出門踏著腳尖頭澧州大同普濟禪師因僧問如何是本來人濟云共住不相識頌云同行同坐不知名撒手相將秪麼行萬仞峰頭休駐足還須踢倒鐵圍城魯祖因僧問如何是不言言祖曰汝口在甚麼處僧曰某甲無口祖曰將甚麼喫飯僧無語頌云這僧置一問似乎討棒打自云不識字猶念之乎也阿難獲本妙心頌云南北東西處處通何須特地捉虛空為汝指個安心法踢倒門前雙徑峰世尊因五通仙人問云佛有六通我有五通如何是那一通世尊召仙人仙人應諾世尊曰那一通爾問我頌云那一通這一通四方八面盡包容聲前略露些些子遍地春光遍地風志公曰終日拈香擇火不知身是道場頌云結個茅菴在嶺西山深不聽五更雞侵早起來燒淨水撥盡寒爐火一堆般若經云清淨行者不入涅槃破戒比丘不墮地獄頌云大千俱捏碎何復有形骸不踏涅槃路定不受三災即心是佛頌云軟似麻繩硬似錐甜如蜂蜜毒如砒諸人若餂刀頭味割舌毋嫌馬簸箕南泉住菴被僧打破鑊子頌云作家把手泛江湖湖客逞凶打破鍋從來好心招好報惡人自有惡人磨乾屎橛頌云雲門乾屎橛咄咄咄咄咄老鼠拽須彌烏龜爬上壁女子出定頌云說出說入棹棒打月罔明文殊一齊趁出舌頭從來在口中牙齒純是一具骨法眼指簾頌云指尖頭上露鋒芒逐塊師僧自喪亡若能連座俱掀倒落得當堂戰一場疏山造塔頌云一文二文與三文倒指分明數目親羅山古佛多饒舌爭奈重增痛上疼德山托鉢頌云鐘未鳴鼓未響家常茶飯任君嘗密啓意善參詳才著思惟手腳忙趙州勘婆子頌云趙州特去勘婆子覿面相逢秪如此婆子指路與趙州也是班門弄斧頭無夢無想頌云無夢無想主人翁到晚歸單睡正濃山家忘卻山中境伸足柴床日已紅枕子落地頌云忽然枕子撲落地花落鳥啼原不異網羅跳出任施為拈取須彌塞海水佛事總憲存憶唐公請為正法禪師封龕生悠悠死悠悠衲僧似海水長流曾為辨嶽參禪客更接天童法乳儔仔細從頭一打算萬事無如歇了休休則不無且道臨行一句作麼生道遂掩龕云事已了意已休那事須知觸處周又祭正法師一炷香一杯水法門相知供養你且道知後如何良久云唯元旦祭高峰大師來來去去入娑婆秪為時人太多事山僧年初三上香誰識其中自拜自顧視大衆云那個是自聻良久云相看原是舊時人不合而今新指示高念祖汝揆兩居士為薦祖考己未進士玄期府君祖妣屠太宜人顯考庚辰進士寓公府君請對靈小參道遠乎哉觸事而真曾經鬧市街前過眼裡何曾見一人聖遠乎哉體之則神自攜瓶去沽村酒卻著衫來作主人大衆今日高府請薦亡小參且道亡靈即今在甚麼處師良久彼彼不相干涉處何必叨叨更問渠下座為覺非沈府君對靈小參雖一乃沈君之別號寂處如何論淺深應之於手得之於心玄機不藉他人力石上栽花孰可親壞土三魄真活計再四思君不見君山僧重重為指示枯木抽芽別有春師乃召衆云既是別有府君神靈在甚麼處卓拄杖云唯此一事實又卓一卓云餘二則非真為雲心參頭火參頭坐脫曾經千槌萬煆而今爐鞴俱銷衲僧別無奇特臨行撒手逍遙擲火炬云山僧從來無妙訣一把枯柴萬事消為歸仁禪人火生不涉死無干那事須知總一般擲火炬云索性與汝重道破火裡圓光君自看為宗聞禪人封龕生也不道死也不道生死兩關如鳥出巢海闊天高任鳥飛掩龕云這裡不得錯過好錯過且置且道這裡是甚麼所在良久云了又舉火父母未生前衲僧舌頭遍大千父母已生後阿誰不具窮相手拈卻前後這些些從教火裡翻斤斗翻斤斗蘇州有兮常州有還有一句臨行語途中緊絆草鞋走為靈源菜頭火天台出跡天華菜頭二俱不住燒了便休休則不無且道靈源即今在甚麼處擲火炬云撒手相將無住處靈源何處不風流又入塔盡大地是個普同且道向甚麼處入擲骨云向這裏入為圓覺禪人火生未圓死合覺撒手懸崖日升月落且道落後如何擲火炬云一把乾柴一堆灰是則名為真解脫為空我老師火空我空人何處不親便與麼去少分相應為新耕禪人入塔昨日才燒今朝又煆兩段不同請君一看舉骨云與麼會去便會去不會更入紅爐煆為智華禪人火智華智華切忌周遮驀直行去管保不差灰飛煙滅後何處不為家為一徑言菴主下火師以火炬打圓相云生也全憑爾死也全憑爾透過生死兩重關內中別有些些子言菴主須記取擲火炬云我見燈明佛本光瑞如此為開石禪人下火生不錯死無差夜半翻身摸著他通身顯現通身露一回煨燼一回賒為聖襄弼維那封龕不是吾徒輔弼幾乎流落村莊吾今道已行也子猶長往他邦更有末後一句不曾為子商量大衆商量則且止如何是末後一句遂掩龕云藏身處須沒蹤跡沒蹤跡處不宜藏秪麼坐斷毗盧頂十方世界總家鄉又下火刀難砍火難燒俊哉無形本寂寥撩起便行真衲子不存毛髮於絲毫切須記我臨行句大覺山前走一遭為守齊朱道人火客歲死今歲燒勝熱門前怎肯饒今歲燒客歲死生死兩途俱如此就中一著絶商量欲假言詮須止止舉火炬云個段光明亙古今擲火炬云不妨拈出些些子為空上座火師云真性無住真心無心真滅無滅真生無生空上座向這裡撩起便行說性說心說滅說生總是間家具不若休長老助汝丙丁送入火光三昧為開石禪人封龕眨上眉毛事若何卓拄杖云這些還曾薦得麼遂以手指龕云驀直去莫蹉跎回途入室再揩磨雜著僧約良材不彈而自直智人不令而自行楩楠自具真繩筠松自嫻法墨其如品類間有不齊是以百丈立叢林所至有理法以接淳厚之士有擯辱以懲躍冶之徒務使人人舉措得宜威儀整肅預防不肖之心以登正覺之路略取數條以砥智刃庶使溝澮之流共入法海南山之竹不扶自直耳募修造白蓮山僧初住爭奈百無一有欲要整舊如新只貴大家出手龍象蹴踏交參頓破時流窠臼且道破後如何咦瓦礫翻成帝釋宮草木叢林獅子吼齊單金牛撫掌處堂前喫飯來滿盤俱托出何用別疑猜莫疑猜須知慶讚遇香齊募知浴大地法王身諸人作麼洗若將水洗塵決定無此理更問事如何擲筆云急須自薦取跋成中理書記手書金剛經金剛大義無住處擬假言詮落躊躇但得言空義也空三十二分誰分數曹溪當初聞此言我從源頭今流住不敢作解別生枝只將斯語為緇素高念祖居士以白蓮寺十景詩見示次韻奉答身似孤雲任卷舒雙溪澄碧繞僧廬渡頭春漲堪閒泛村落煙迷好卜居羌笛秪因苔徑隔胡笳不到柳塘紆青田龍臥聲光赫白社蓮開香影孤月朗天中禪定起風恬簾外諷經初有詩漫和達夫韻無酒難留元亮車貧至兩餐纓絡粥聽君匡坐讀奇書大休和尚屬詠白蓮寺十景漫成長律應之附念祖高居士原韻翻經水國壯懷舒漢魏分流映佛廬柱史抽簪貽勝覽文成攜笈重幽居鐘聲夜度龍山近帆影朝懸角里紆散步農疇春事好閒聽漁唱物情疏繞簷翠竹搖風細拂檻香桐漏月初五柳塘邊堪載酒嘗豐橋畔少驅車余家四世留吟案半是逃禪半讀書
