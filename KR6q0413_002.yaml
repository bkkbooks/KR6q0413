body:
  text: 侍者德常錄住持嗣法德一編次入院上堂宣疏拈香祝聖罷乃就座維那白椎云法筵龍象眾當觀第一義師豎拂云是一是二上士一決一切了中下多聞多不信但自懷中解垢衣誰勞向外誇精進真覺大師好與一頓不合作賊人心虛今朝法筵初啟四眾雲臻倘有騎賊馬趁賊的出來𨁝跳看僧問如何是白蓮境師云門前雙井口朝天進云如何是境中人師云山僧今日多饒舌僧禮拜又僧出師問云你向未開口已前道將一句來僧擬議師震威便喝居士問我為法王即不問於法自在事如何師拈棒士便出師云恁麼則不自在也乃云有問有答落七落八無問無答守山鬼窟休問答莫守窟淨梵王宮生悉達吐水九龍天外來捧足七華從地發指天指地獨稱尊一棒當頭要打殺白蓮仔細簡點來動著些些正眼瞎大眾動著即正眼瞎作麼生是不瞎的正眼良久合掌云我不敢輕於汝等汝等皆當作佛維那再白椎云諦觀法王法法王法如是下座乳源上座請上堂師纔入法堂顧視左右云大眾有甚麼事麼眾無語遂陞座云法門寥落祖道垂秋若要扶起全賴大休休則不無作麼生說個扶的道理作抖身勢云抖擻多年穿破衲襤毿幾片逐雲飛復舉南泉云王老師自小養一頭水牯牛擬向溪東牧不免食他國王水草擬向溪西牧亦不免食他國王水草如今不免隨分納些些總不見得師云山僧亦有一頭水牯牛也不向溪東牧也不向溪西牧也不隨分納些些不使奔逸不縱驕奢得放下且放下是甚曲調歸堂喫茶下座上堂一不是二也非守真志滿逐物意移擲拂子下座僧出眾云大眾證明師云證明個甚麼僧便喝師便打結制本寺眾勤舊請上堂封起拄杖頭結卻衲僧口大家團圞頭畢竟有來由大眾有甚麼來繇聻卓拄杖云不是冤家不聚頭又卓一卓云不妨頭上又安頭下座問答不錄虞居士誕日請上堂白椎竟僧出禮拜起擬問師云維那說底甚麼僧無語師便打乃云居士今年五十九甲乙丙丁庚戊丑屈指從頭數得來數目總在山僧手其中一個好因緣自古春秋俱不有因齋慶讚示諸人只要人人獅子吼僧問如何是寒灰枯木去師云荷盡已無擎雨蓋菊殘猶有傲霜枝進云恁麼說則易轉身似覺難師云不唧溜漢僧禮拜師下座檀越汪振華封翁同李聖徵姚子謙二居士請上堂師云今日是本山護法汪居士同李居士姚居士設供請山僧陞於此座為大眾說些佛法若論佛法教山僧無下口處若說佛則汝等諸人各各腳跟下放光動地是個甚麼若說祖則白蓮恢張法席廣聚人天鉗錘衲子又是個甚麼若說禪則終日拈的示的露的又是個甚麼若說道則心裡悟的口裡說的耳裏聽的又是個甚麼與麼說話猶是隨緣赴感應彼來機若論佛法向上一毫也用不著何故聻說佛佛之一字吾不喜聞說祖祖師喚來洗腳若說禪道禪道不在口頭恁麼則說佛亦不得說祖亦不得說禪說道纔不得只此不得亦不可得既不可得秪如今日護法設齋命陞此座又且如何舉揚卓拄杖云流布葛藤無用處不如收捲過殘冬下座姚敬田居士誕日請上堂姚老今冬六十四問著生年不知數自謙老拙百無能我道其人有大智西天達磨不會禪東魯仲尼不識字山僧倒讀番本書卻把張三喚李四大眾為甚麼卻把張三喚李四喝一喝云只許老胡知不許老胡會元旦上堂一年三百六十日今朝又是從頭起拈香祝聖賀新年試問諸人委不委又拈香云更有一炷重拈出供養象田和尚嘴為甚麼不熏他鼻孔聻擊拂子云鼻孔在我手裡下座師誕日本寺眾勤舊請上堂師拈拄杖云拄杖子今年又添一歲了也且道拄杖子年多少與山僧齊年且道山僧年多少與拄杖子齊年擲下拄杖云拄杖子與山僧縛作一團拋向諸人面前漆桶不會打鼓普請看下座上堂出鄉半月餘眼睛對鼻孔囊中無一物拾得個骨董送入常住中庫司供大眾莫作佛法商量休作世諦儱侗召眾云既不許作佛法商量又不作世諦儱侗畢竟如何理會聻卓拄杖云步行踏斷流水聲大地山河掌握中復舉高峰云盡十方世界是個缽盂汝等諸人喫粥喫飯也在裡許屙屎放尿也在裡許行住坐臥乃至一動一靜總在裡許若也識得達磨大師只與你做得個洗腳奴子若也不識二時粥飯將甚麼喫參師云白蓮則不然盡十方世界雖是個缽盂喫粥喫飯也不在裡許屙屎放尿也不在裡許行住坐臥乃至一動一靜俱不在裡許若人識得達磨大師與汝做個同參若也不識燒茶用水炊飯用米喫得屙得福不思議僧問為尋知己即不問格外玄提事若何師云三塔灣七曲八曲進云恁麼則全機獨露超調御意外明宗信不通師云四依亭橫行豎行進云白蓮堂上獅子吼鳳凰州內浪滔天師云不勞讚嘆下座結制本寺眾勤舊同崑石王居士請上堂一年一度解一年一度結不是白蓮新規乃是諸方舊轍禪客相逢沒故新須信其中滋味別寒山騎虎入松林倒拈苕帚是拾得普化四方八面來臨濟堂前罵老賊二祖斷臂乞安心及至安心不可得大眾山僧從不解欺人所以一一為拈出擲拂子下座護法李斗如俞少泉同眾居士請上堂西堂問前百丈不落因果為甚麼墮卻野狐身師豎拂云不離這個進云後百丈不昧因果為甚麼脫卻野狐身師豎拂云亦不離這個進云不落不昧畢竟喚作甚麼師復豎拂云亦不離這個西堂云若無風擾雪怎顯凍梅香師云你只好做西堂侍者問大事未明如喪考妣大事已明為甚麼亦如喪考妣師云果是銅頭鐵額漢銀山鐵壁必須鑽者云如何是大事師云掃地去者禮拜起云恁麼則飢來喫飯睡來眠也無佛法也無禪師云纔沾滴水便解興波乃云前百丈不落因果墮野狐身豎拂云不離這個後百丈不昧因果脫野狐身豎拂云也不離這個不落不昧畢竟喚作甚麼復豎拂云總不離這個這個那個一齊按過要行便行要坐便坐擬議尋思成話墮放下拂子云阿呵呵還會麼知事少時煩惱少識人多兮是非多侍溪馮居士請上堂僧問鐘鼓已鳴識得了也正恁麼時請師答話師云但看未鳴前進云龍生金鳳子撞破碧琉璃白蓮相肯也無師云但識琴中趣何勞絃外聲進云覿面若無宗正眼焉知全露法王機師云三十棒乃云一路來一路去業識茫忙無本據如刀剖水風吹光個裏孰分麤與細喝一喝下座護法同香客請上堂參也參到無參處說也說到無說時參到無參處正好參說到無說時正好說假饒參說一齊撥孟八郎漢如何止遏所以道逢強即弱遇柔即剛廚房施主設齋香眾聞鼓響俱進齋堂莫管東來西來飽食饅頭粉湯或問其中旨婆舌為宣揚果珍李柰菜重芥薑若還不會再扣方丈下座上堂不談佛法不談禪暮雨連連朔月天會得其中端的旨大家喫飯了瞳眠忽有人來索飯錢作麼生支遣不見維那道法筵龍象眾當觀第一義你還是龍象眾麼若是龍象眾第一義作麼生觀若謂維那白椎處是第一義侍者送拂子來是第一義擊鼓撞鐘是第一義燭臺香爐是第一義佛殿三門是第一義說者聽者是第一義若與麼會秪成個逐色隨聲漢子於第一義中總沒交涉汝若要於此事相應當內不存知外不立見世法佛法一擔掀翻但飢來喫飯寒來著衣無絲毫繫念在心自然開口道著動步踏著且道踏著個甚麼今朝不覺連綿雨明日天晴再主張下座元旦淨圓勤舊請上堂拈香祝聖畢乃云年新月新日新人人慶賀新春個個東拜西拜撞著無位真人新舊當家齊著力大家扶起破砂盆山僧亦不中途倦拄杖竭力把門撐卓一卓下座佛日師翁三周忌日上堂僧問昔日巴陵為雲門大師設忌有三轉語高峰為雪巖和尚設忌單單只有一句今日和尚為先老人設忌又且如何師云我這裡一句也無進云昔年今日先老人向甚麼處去也師云即今抖的進云即今又是個甚麼師豎拂云會麼進云雖然面目儼然在一番提起一番新便禮拜師乃云盡道師翁今日死某道師翁今日生生死去來尋常事為甚諸人特地驚若能言外知歸去撥著須教解翻身於中弗能親薦取十字街頭等個人卓拄杖下座解制上堂師云結制時東來西來解制時南去北去雖曰結拂子未嘗結何必東來西來雖曰解拂子未嘗解何必南去北去山僧老實為大眾說個事中間不在東西南北有飯喫飯有粥喫粥一日三餐千足萬足僧問九旬禁足大似畫地為牢忽有羅籠不住呼喚不回且道此人還在解結內麼師云風吹不響鈴兒草雨打無聲鼓子花進云獅子吼處乾坤裂毘盧頂上任縱橫遂以坐具頂頭而出師云可憐出盡家中醜致使傍觀笑破唇下座結制上堂百日期場今日始個事諸人自擦磨牙關咬定疑生死面皮翻轉疑團破疑團破銀山鐵壁都推倒得失存亡俱按過眾中還有是般人麼如無山僧下座往街收供擔頭上為諸人說破堂主問世尊說法四十九年未嘗說著一字和尚今日高登寶座闡揚大法未審說個甚麼師云汝見我說個甚麼堂云正令已行全體露那分南北與東西師云但得時中不瞌睡碧空原是舊蒼天堂云各家門首無為鏡炤破虛空舊面皮師云爭奈門對千竿竹猶有屋後萬株松堂云男兒不具超方眼焉識吾師顯大機便禮拜師下座師誕日眾職事請上堂山僧今年三十七辰巳午未申酉戌乙卯年己卯月丙午時辰丁酉日若將這些作生辰猶是眼中重添楔復召眾云既不將這些作生辰且道將甚麼作生辰良久云未出母胎度人已畢堂主問開口只說無生話如何是和尚生辰師云生也堂云恁麼則金風搖動澄潭月嶺外梅花徹體香師云但得無心並無事何勞南北與東西堂云洞上一宗開正眼分明全露法王機師云痛上加鞭策辭中更著詩下座解制晚參師垂語云白蓮不住資聖不居衲僧家向甚處安身好時江南資聖寺請師維那云擺手出長安師云新維那說舊話一僧作咳嗽聲師云作麼僧云某甲傷風師云子是真病乃云諸兄弟東去西去那事中間須仔細三條椽下好安身七尺單前非容易福薄身輕心不安途中切莫生他計逢溪先把杖頭探腳底恒將草鞋繫何故聻石頭路滑無瑕庵主請晚參師云久不到家鄉相逢語話長途中多風雨搭船坐中倉及至歸家已拄杖左右量長不是短圓不是方若能不在方圓上踢倒門前枯樹椿除夕晚參僧問如何函蓋乾坤句師云普如何是截斷眾流句師云住如何是隨波逐浪句師云今晚三十夜初一早商量乃云一年一年又一年一月一月又一月光陰易過人易老忙忙日月相催逼未透前三與後三腳跟底事黑漆漆朝參暮究不相似只為馳求不肯歇但把奔逸盡拋離此是山僧真秘訣秘訣不假於心思那許其中著言說龍樹昔年誹大乘自悔持刀把舌割諸大德參禪學道不為別事只要臘月三十日眼光落地時這一片田地四至界分著實分明今正其時還有著實分明底人麼良久云莫把是非來辨我平生穿鑿不相關晚參言前薦得猶成滯句後承當早已遲為恐諸人未勦絕吾今暫說不如斯擲拂子云吐膽傾肝俱說了不是飽參人不知結制示眾師云結制不覺經一七個事諸人畢未畢如未畢山僧為汝重剖析大眾但不得動著動著則頭破腦裂僧纔出師便打云動了也示眾有收有放鞭繩在手能殺能活鮮血淋漓是者等人方能喫佛飯穿佛衣受佛戒罵佛非不脩福不造罪隻手提起利剛錐佛也錐祖也錐何故聻良久云者裡無處著落莫怪山僧用鉗錘示眾卓拄杖云如是見如是知如是解不生法相拈拄杖云法相生也是凡是聖擲下拄杖云今夏常住淡薄一日三食冷飯大眾喫得肚脹行住坐臥如然好個參禪榜樣示眾僧問入理深談即不問七縱八橫事如何師云非公境界僧無語師云果然乃云入理深談朝三暮四出長安道七縱八橫具如是作略方堪荷擔吾宗復顧視左右云還有克家種草麼如無山僧為爾道破卓拄杖云者裡親薦取獨步任西東示眾僧纔出師便打又僧出師云三十棒僧無語師云蒼天蒼天乃云拄杖子橫打豎打不曾打著一個還有向未拈棒前撩起便行底麼因侍者有省示眾師云禪不屬參道不屬悟佛亦不成眾生不做向這裡摸著鼻孔一任隨緣放曠任性逍遙拗折拄杖放下腰包其或未然一狐疑了一狐疑江北江南問王老示眾師云寸絲不掛自然赤條條粒米不嚼各各飽齁齁即今身上穿底口裡喫底又明甚麼邊事還有撥轉此關者麼示眾師云三祗煉性脫落只在暫時八定四禪取證不離當處還有不假脩證者麼示霞山道者四生六道蓋為此不明故有輪迴之相汝幸生富貴之家無衣食之逼正好趁色力康健時參究此道但看未生董宅之時這能語能言一點靈明在甚麼處安身既生之後能語能言復是何物者裡看得破念佛是誰不須問人矣參究用工之法不得放緩緩則被散亂妄想混擾難得成片名為間斷古云學道如鑽火逢煙切莫休直待金星現歸家始到頭思之人身難得佛法難聞世人匆匆混過一生向此門中問道有幾幸汝夙植善根得遇善知識發心參禪求出世因實難得耳但要信得及久久不退定有相應分也至囑掛鐘板師擊板一下云打破趙州關又擊一下云擊碎雲門普雪峰三輥毬禾山四打鼓普化掣風顛面壁是魯祖白蓮爐韝新開大者歡欣小者舞休歡舞復擊一擊云觀音妙智力能救世間苦
