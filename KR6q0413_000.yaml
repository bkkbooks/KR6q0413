body:
  text: 曹溪大休珠禪師六會語録總序自達祖傳衣止于盧祖是有一花五葉之識曹溪為禪門之大宗猶夫洙泗為儒門之大宗也儒門以日月傳自十哲迄孟子藉有六經微言而諸儒輩出晦蝕反深禪門以一燈傳自馬馱迄葦渡始稱西來直指而嗣法爭光長夜復旦洙泗淡泊收拾不住者翻藉曹溪以灌溉之金絲堂鼓鐘寥闃無聞者悉托大雄殿鐘鼓以導揚之自唐宋迄明如王右丞蘇玉局王文成一輩世出世間伶俐英傑漢子日在詩書禮樂場中而濡染曹溪一滴以佐汪洋作略者固指不勝屈突況乎前身後身前波後波改頭換面翻筋轉斗總不越無始劫來個中一副性命根器者乎此儒佛圓通之解也五宗各別門庭究不越截斷衆流函蓋乾坤兩種義趣能截斷者必能函蓋而自青原迄曹洞畢竟函蓋之義趣居多能函蓋者必能截斷而自南嶽迄臨濟畢竟截斷之義趣居多二宗所有觭立可久可大若溈仰雲門法眼三宗就流傳語句離即參觀究無越二宗義趣其宗一出南嶽二出青原名分實合有傳無絶也掃道人目擊雲門湛天童密兩大老標幟江南繩鞋拄杖往還相錯得法於湛者輒自密來得法於密者輒自湛來只就大休和尚淵源溯而上之為象田即念為龍門石雨兩和上以洞上真鋼刮人眼膜者謂於濟上淵源不水乳針芥于曹洞不可也獨怪比來截斷門庭一切消歸函蓋欲剖濟與洞不得何煩以濟角洞此又洞濟圓通之解也掃道人滄桑後從南雍奉假還居東皋與白蓮古剎咫尺時得偕休和尚落草盤桓嘗屬作妙濟定隱兩録辨辭矣甲午秋應張總鎮雲臺之請飛錫曹溪南華道場為余本師憨山肉祖中興之地余以步趨夙因瓣香托供棹送北閘外十餘里遇雨大注而返自此法翰數臨萬里覿面方委筆曹溪全録總序附藏流通于楞嚴般堂而寂音俄至踐諾未遑賴有嗣法堂頭某公鳩工授梓于諸録中約略存半始自越城天華而苕溪密印而大覺妙濟而檇李白蓮定隱而特首之以曹溪實終之以曹溪六會中橫説豎説熾然説無間説年來廣長舌已從一指頭遍覆三千大千世界矣到南華時安衆普説有云此道場六祖去後冷落千餘載憨山大師謝世又經三十餘秋法門衰相祖道荒涼山僧既入祖師門當行祖師事六祖憨師所立法則不可違犯所行規矩依而行之不可動著一絲毫許何故佛佛道同豈有他哉又有設供獻六祖肉身拈香法語設供獻憨山大師肉身現在天峙岡法語又與掃道人手書有曹溪仗憨大師法則叢林尚井井有條大師自著年譜一到合山大衆如飢渴之得飲食望發板來永垂不朽云云因憶憨山曹溪大衆苦請匡山大衆苦留時有徼六祖靈得托骨之語再度庾嶺時有到水窮山盡處梅花無數嶺頭香之句意終曹溪兆已早見一到即擇地營塔恰歲而示寂更歷二紀之久其間迎龕五乳歸龕曹溪數四反覆始得肉身出現媲美盧祖死生去來全得自主的的威音那畔所希有事今休和尚一入曹溪而緇白歸之如市佛祖揚于中天五千衆集挈洞濟之綱維期月化成振宗教之領袖更復預知時至不昧先幾從曹溪與嗣法定隱鶴林茂公書𠳿𠳿諄諄纍一千四百餘言無非雙樹垂足遺教痛切話頭直云今生不能再來不可説破令諸子動念又云九峰三遍出定灌溪七步而亡有七日來有擲筆逝有沐浴焚香升座別衆上來尊宿恁麼自在只緣四相皆空五縕不有二六時中不落意思信口便道信步便行直來直去不見有一絲毫許佛法世法云云只此一書於末後一著何等徹底分明恰住二載年未及艾疾非沉痾遽命造龕刻期集衆立亡坐脫與祖師先後一揆曹溪耆宿始信寶林堂上行解齊彰死生無礙者自盧祖憨祖兩大師以迄休和尚而三也此真曹溪一滴可為洞濟圓通宗教圓通佛祖圓通儒釋圓通之明效大驗也因系以贊贊曰靈山記莂萬古曹溪風幡大樹寶林菩提掀翻溟渤踢倒須彌優鉢羅花虛空三現先覺先知去來快便説法度人誕登彼岸順治戊戌嘉平月望國子司業前戊辰二甲進士工部虞衡郎大理寺副憨祖親侍弟子福徵檇李道一居士掃菴談貞默槃談謹撰大休珠禪師語録目録序目録卷第一住曹溪南華禪寺目次上堂晚參示衆法語卷第二住檇李白蓮禪寺目次上堂晚參示衆法語卷第三住檇李定隱禪寺目次上堂晚參示衆行實卷第四住大覺妙濟禪寺目次上堂晚參示衆法語機緣附諸剎卷第五住湖州密印禪寺目次上堂示衆頌古佛事雜著卷第六住越城天華禪寺目次百問上附答頌卷第七住越城天華禪寺目次百問下附答頌卷第八住曹溪南華禪寺目次書問上卷第九住曹溪南華禪寺目次書問下附諸剎卷第十住曹溪南華禪寺目次普説上卷第十一住曹溪南華禪寺目次普説下附諸剎卷第十二住曹溪南華禪寺目次偈讚附行狀塔銘大休珠禪師語録目録終
