body:
  text: 嗣法弟子德明答頌瑞鹿法孫行信編次問有句無句如藤倚樹樹倒藤枯且道句歸何處答夜來床席暖伸腳到天明頌一條白棒沒頭埋脫落一聲天外來獅子翻身擒住也至今懸挂在眉台問若論此事直饒辨若懸河答如流水總與那事沒交涉如何是那事答某甲忘卻了頌東風昨夜到天邊吹落寒光隱翠巔縱有兜羅攀不住夜深倒挂月明前問千說萬說不如一決且道決個甚麼答鼻孔大頭垂頌古澗溪頭楊柳青黃鸝處處弄機聲東風一陳吹將盡花蕊紛紛滿四鄰問喝一喝云是賓耶是主耶答某甲昨日從天台來頌耀武揚威振萬兵一番提起一番新紅輪透出金鞭響得勝歸來萬國欽問拈拄杖云一千七百則葛藤皆從這裡出且道這個又從甚麼處出答且放下著頌驀地翻身透萬峰吹毛揮處落霜紅展開兩隻修羅手百億須彌不露蹤問不是嶺頭傳底事豈從雞足付將來即今手裡拈的口裡道的畢竟從甚麼處得來答拂子頭邊頌昨夜泥牛翻海底今朝木馬吼春風須彌撥轉青霄外大地收來掌握中問心明能超曠劫英雄力破重圍為甚麼道秪為分明極番令所得遲答太平原是將軍致不許將軍見太平頌百戰場中得自由將軍韜略掌中籌揮開日面驅雷電萬里關山暗點頭問如是我聞與乾屎橛是同是別答冬瓜直儱侗瓠子曲灣灣頌犀牛驀地翻身轉踏破煙霞幾萬重滿目春光留不住海門迸出一輪紅問東家作驢西家作馬要騎便騎要下便下且道此人得何三昧答腰纏十萬貫騎鶴上楊州頌金毛擺尾出雲峰搖落桃花遍地紅踏破珊瑚枝上月木人起舞笑春風問夜深不向蘆灣泊迥脫中間與兩頭且道此人如何行履答風力扶帆行不棹笛聲邀月下滄洲頌梁主追尋過別峰流傳千古與誰通秋江暗渡無人識不住蘆花兩岸中問在眼曰見在耳曰聞在手曰捉在足曰奔便恁麼承當還有過也無答親者不問問者不親頌一葉扁舟江上遊十分春色許誰收獰龍迅轉千層浪曾把須彌作繡毬問高峰四句內有一句能縱能奪能殺能活且道是那一句答問處甚分明頌芒鞋踏破鐵城東聊借烏藤下別峰格外乾坤都掃蕩輕輕拈向鉢盂中問趙州東壁挂葫蘆意旨如何答無意旨頌一毫頭上露天機凡聖由來總不知輕輕撥轉關捩子枯木花開劫外枝問此衆無枝葉惟有諸真實作麼生說個真實底道理答人人腳跟點地頌八面玲瓏繞翠微通身毛羽利如錐溪山怪石都穿過脫殼烏龜也解飛問摘葉尋枝則不問直截根源事若何答曲了也頌長空迸出一輪秋萬國驪龍捧玉毬拍碎寒光飛遍地還他作者始能收問殺父殺母向佛前懺悔殺佛殺祖向甚處懺悔答燈籠露柱頌怪石叢中白象王六牙才現紫雲彰玉蹄踏轉千溪月撲落寒梅遍地香問無舌人解語無手人行拳無手人打無舌人無舌人說個甚麼答逢人但恁麼問頌四十年來懶坐禪常將古佛枕頭眠睡中無甚真消息鎮夜齁齁大打鼾問普慧雲興二百問普賢瓶瀉二千酬且道問底答底從甚麼處來答隨聲便喝頌紫氣騰騰山色奇靈峰怪石露天機三間茅屋從來住一滴曹溪繞翠微問多年塵土無人拂一身常鎮在天涯為甚長安大鬧答錦上鋪花頌拋出傾湫倒嶽機虛空凜凜雪花飛夾山無限清平樂不值山家兩道眉問有語成謗無語成誑有無俱遣且道作麼生商量答老漢忘卻話頭了也頌夜深無事躡高巔獨步攜笻到壑邊惟有一輪明月照棒頭獨破水中天問風吹日炙還當得祖師西來意麼答爛卻多少頌虛空吐出一枝花馥馥清香映碧霞一陳狂風吹欲盡紛紛幾點落誰家問三腳驢子上天台且道日行多少答一去二三里頌良馬追風不用鞭誰將雲影挂青天翻身不覺騰霄漢踏破長江月一團問參禪學道人秪要會得本命元辰的落處假若四大分張本命元辰落在甚麼處答只在此山中頌參禪須要識元辰枯木花開劫外春杖頭點出無心月堪作人間第一燈問劫火洞然大千俱壞未審此個壞不壞答長安雖鬧我國晏然頌那事明明偏剎塵何須特地問知音哮吼一聲天地裂大千無處不稱尊問玄沙三種病人如何接得答便與麼去頌沙裡淘金始見真百般捏怪度殘生本來一個風流漢何必人前叫苦聲問道遠乎哉觸事而真如何是道答飢來喫飯倦來眠頌萬念灰來一物無悠悠何事涉程途推開日西月面佛透出江心月下波問古人道向上一路千聖不傳向上一路千聖不然不傳不然則不問如何是向上一路答觸破天邊月頌翠竹黃花古佛心銛刀利刃耀乾坤夜深碧澗寒潭底透出團團月一輪問般若如大火聚動動則燎卻面門為甚麼又道眼光爍破四天下答不離當處頌坐臥經行總一般更無一法雜其間悠悠踏斷山頭路香滿溪山花滿園問一即六六即一一六俱忘時如何答家家門前火把子頌密密綿綿不漏機山花澗水兩相宜誰知六一俱忘後千聖從來不識伊問拈一莖草遍覆大千還信得及麼答少賣弄頌金風吹過碧峰頭赤腳胡僧得自由蒼松白石融心劫逆水長江晝夜流問觀世音菩薩將錢買糊餅放下卻是饅頭還是神通妙用還是法爾如然答栗棘蓬頌栗棘蓬邊得自由原來放下是饅頭夜半日輪當午照金雞啼在五更頭問開口早經千萬里低頭思慮萬重關指人若也無正眼何啻前程作野犴作麼生是指人底正眼答爛冬瓜頌風寒吹凜烈碧雲千古潔牛頭未見時百花頻落葉問雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾試道道看答打云放過則不可頌扇子何曾跳上天雲門拈向鼻頭尖嚇得釋提心膽碎幾乎躲在碧巖前問肅宗夢發菩提心志公向宗道十二其中還有道理麼答相識滿天下知心能幾人頌菩提寶鏡映三台漁翁把釣送將來接得驪珠藏世界休將世界挂心懷問江山改而心不易海嶽遷而志不移為甚麼有得有失答石人無夢頌山河改變有當人花發枝頭樹樹新等閒識得東風面萬紫千紅總是春問瞬目已經千萬劫揚眉猶隔萬重關作麼生得勦絶去答未開口前頌雲從山裡過撞著火柴頭燒盡虛空界紅光射斗牛問徹底掀翻的我道未在鼻孔撩天者尚不放行且道山僧具甚麼眼目答瞎頌掀翻大地有何難莫把煙霞仔細看劃破長江流注涇鷓鴣啼處百花殘問世尊言應如是知如是見如是信解不生法相驀拈拄杖云喚作個甚麼答沒有名字頌雷轟電閃一條白練兩個古錐佛也不見問談真即逆俗順俗則違真如何得不相違去答君明臣良頌寂寂本來空虛名待雪峰松下問童子只在此山中問法不在內外中間未審在甚麼處答鳴指云在這裡頌法法頭頭得自由將軍有令定機謀手敲石鼓叮咚嚮撥轉機輪向上酬問會得那邊事卻來這邊行履且道那邊事作麼生答逢人切忌錯舉頌雞足山中等個人龜毛頭上解翻身赤腳波斯空裡走悠悠獨步在江濱問莫向白雲深處坐切忌寒灰煨殺人畢竟如何出得此過答剎竿頭上風車子頌獨坐孤峰看月華眼裡何曾著得沙踏斷浮雲千萬片如何及得老僧家問拈拄杖云喚作是亦不得喚作非亦不得畢竟喚作個甚麼答胡張三黑李四頌獨憐幽草澗邊生上有黃鸝深處鳴春潮帶雨晚來急野渡無人舟自橫問三玄收不得四句豈能該未審是個甚麼答石女不揚眉頌閃電光輝當門霹靂作家相見東墻西壁問一輪超出三界外當軒照破萬家門即今山門佛殿作麼生說個超破的道理答竹密不妨流水過山高豈礙白雲飛頌撾毒鼓震大千水裡無筋透碧天杖頭點破摩醯眼撥轉乾坤風月前問猿抱子歸青嶂裡鳥銜花落碧岩前不得作境會且道作麼生會答舌頭無骨頌細雨紛紛灑玉樓佳人對鏡早梳頭忽然打破菱花鏡一道寒光射斗牛問劫火洞然而常靜步行踏斷流水聲還有是般人麼答十字街頭石敢當頌金雞聲唱太平歌兔子從來不出窩語若雷兮轟劫外光鋩一點射娑婆問汝若胡喝亂喝我即橫打豎打且道賓主相見還有過也無答赤眼撞著柴火頭頌擊碎重關拈出布衫有過無過揭過一班問善財參遍處黑豆未生芽且道明甚麼邊事答踏著稱鎚原是鐵頌藕絲縫裡步雲霞楖栗橫擔日月斜黑豆而今拋出也從教何地不生芽
