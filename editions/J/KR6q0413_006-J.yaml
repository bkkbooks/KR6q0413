body:
  text: 嗣法弟子德明答頌瑞鹿法孫行信編次問振動乾坤即不問絲毫不挂事如何答脫殼烏龜飛上天頌滿面慚惶不識羞溪山浪說笑顛頭默然打破扶桑國放出金烏劫外遊問粉骨碎身未足酬一句了然超百億作麼生說個超底道理答瓦礫翻身頌瓦礫翻身透古今從教何處不稱尊直饒無句言前薦猶落牟尼後子孫問歷劫深恩終難報為甚雲門又打伊答家富小兒嬌頌指天指地老狐精世間若個是生盲當初早遇雲門老免使人人墮塹坑問賊來須打客來須待且道作麼生辨別答二俱不受頌惱得心中怒氣沖反將一箭射虛空嚇得須彌心膽碎至今千古鬧哄哄問古是今人去今是古人來不涉今古句試請拈出來答平地兩條溝頌只有天在上更無山與齊舉頭紅日近回首白雲低問高揖釋迦不拜彌勒時如何答也須喫棒頌金烏夜半逞風流黃鶴峰高得自由驀地踏翻千尺浪盲龜跛鱉也優游問德山托缽且置勿論巖頭密啟其意又作麼生答暗裡藏春色頌德山老德山老托起缽盂沿街討出門撞著帶角虎擬議遭他一口咬雖然只得三年活金風吹動殘花草問頭云且喜老漢會末後句會與不會則不問且道如何是末後句答明破即不堪頌句裏乘機劈面來虎頭虎尾任君猜泥牛踏破天邊月收拾胡兒鐵草鞋問淮州牛喫禾益州馬腹脹天下覓醫人灸豬左膊上且道其中意旨如何答山之南水之北頌申出兜羅綿手把住四恩三有撞著覓醫童子不可放他逃走問趙州勘破婆子且道那裡是他勘破處答露頌婆婆慣要逞風流淡抹濃粧不識羞自從趙老親相識只得逢人暗點頭問大顛一般扣齒為甚麼擯卻首座答知事少時煩惱少識人多處是非多頌嚴令當行痛下錐眉毛竅裡沒些些可憐一片婆心切千古流傳法不違問三冬無暖氣枯木倚寒崖為甚麼燒卻菴答水向石邊流出冷風從花裡過來香頌杜撰老婆把火燒菴燎卻面門無處伸冤一時不了千古流傳問來如穿衫去如脫襖在今時可謂罕聞為甚麼九峰不肯泰首座答錯錯頌從來不著這襤衫脫卻方知恁麼閒虛空放出拿雲手播滿乾坤任意頑問天童曩來惟抱主拍落無依反叱非畢竟天童底是雲門底是答總不是頌深深直到歸山處反罵胡僧老古錐雲門不識白拈賊鼻孔撩天向下垂問問佛答佛問祖答祖不問佛不問祖答個甚麼答請和尚再舉看頌山自高來水自深野雲處處不相親可憐不遇攀花手狼籍枝頭多少春問一口氣還轉得一大藏教也無答常憶江南三月裏鷓鴣啼處百花香頌碧天千古月寒潭曉夜光截斷葛藤處溪山路轉長問四方八面來時如何答切忌動著頌眉鋒剔起幾重關木偶難移心膽寒乾坤收在毫端上捏碎千山與萬山問不用如何若何便請單刀直入作麼生說個入的道理答不動干戈自太平頌青青山色滿祗園倒跨長溪月一潭龍泉飛出張牙爪不斬蕭何令不傳問多寶塔前合談何事答揭諦莎婆訶頌寶塔橫吞四部洲掌中珠子孰能收夜深不許蒼龍現牛斗光寒萬里秋問齋時一缽和羅飯未審時人作麼消答滿缽盛將來頌粟子無觔也大奇倉沒底任施為和盤托出家常飯萬古叢林作話題問鐘樓上念讚床腳下種菜且道明甚麼邊事答張公喫酒李公醉頌樓閣遲遲月影新清風多在好園林浮萍不落青山外花雨紛紛滿月津問橫按拄杖當門座且道如何過此關答腳跟未動頌把斷三關不漏機威風凜凜孰能窺正令從來行到底不與人間理是非問但有言說都無實義即今說也說了言也言了且道是甚麼義答灼破一天秋頌說說原來無說說石女何曾失卻節言言不失無價珍也是區區眼裡楔問有時一喝不作一喝用既不作一喝用畢竟作甚麼用答三千里外定淆訛頌喝下當陽震大威攔胸好與一千椎撥轉吹毛空裡去也是區區拍馬歸問十二面觀音那面是正答東西南北頌大悲觀世音無剎不現身相識滿天下知心能幾人問從上來一人行棒一人行喝阿那個親答今朝正是娘生日頌行棒行喝絕狐蹤長安道上不相逢等閒拈起鐵橛子勒馬加鞭不露鋒問臨濟云一人在孤峰頂上無出身之路一人在十字街頭亦無向背且道那個在前那個在後答兩個泥牛鬥入海直至如今無消息頌青峰頂上浪花鮮樹子無根葉滿天須彌頂上翻觔斗海外漁翁把釣竿問有一人輪劫在途中不離家舍有一人離家舍不在途中阿那個合受人天供養答無底缽盂盛將來頌擊碎窗前月沖開萬里雲含光成一片大地盡生春問饑來喫飯困來打眠愚人笑我智者知焉且道知底事作麼生答露柱懷胎頌三條椽下逞風流踏著源頭水逆流策馬乘車千古事無心明月上鉤頭問牛頭橫說豎說不知向上有關捩子作麼生是向上關捩子答眉毛竅裡翻觔斗頌鳥啼日暖百花新放出枝頭幾瓣春佛祖位中留不住虛名流落到而今問牛頭未見四祖百鳥啣花諸天送供見後為甚麼覓他蹤跡不見答當初祗謂茅長短燒了方知地不平頌放出傾湫倒嶽威虛空拶得雪花飛鴛鴦一對無蹤跡千古流傳作話題問宗說俱通底人為甚麼我又道他不是答拈得鼻孔失卻口頌宗也通兮教也通聾人聽見五更鐘一聲霹靂驚天地凡聖從教立下風問古人道識得此事便休為甚麼道認著依然還不是答青天也須喫棒頌識得根源即便休有何煩惱有何憂更深夜靜清光皎萬里長空萬里秋問空生晏坐花狼籍語若雷兮聲若霹且道他說個甚麼答隔壁聽釵聲頌空生巖畔花狼籍山色溪聲舌廣長滾滾波濤流不竭長江日夜水忙忙問無陰陽地生個甚麼答放出枝頭劫外春頌無影山中無住基生盲截地不施為獅兒哮吼連星月鐵馬加鞭曉夜嘶問學家參禪貴脫生死且道生死作麼生脫答眼閉腳直頌脫下破草鞋赤腳平地走踏著南山鱉鼻蛇冷地遭他咬一口問脫得生死便知去處一口氣不來向甚麼處去答白雲只在青山內頌脫得脫不得生死如何決決決決六月炎天下大雪問前有猛虎當路後有萬丈深坑左右劍樹刀山正與麼時如何迴避答云哪頌猛虎當陽誰敢立起便起兮擊便擊擊便擊左右逢源虛空霹靂問踞虎頭收虎尾的衲僧且道具甚麼手段答打一掌云某甲一向粗糙頌虎嘯山兮山笑虎大地拈來一撮土羅紋結角深藏處那個男兒敢莽鹵問道得也打道不得也打假若總不與麼時如何答隨聲便打云某甲觸忤尊顏頌昨夜東風遶四鄰今朝脫骨又重新棒頭點出金剛眼透過威音與古今問大德無德大道無道大富無糧大地無草且道居乎師位者以何為人答一條拄杖驀頭該頌浪蕩江湖數十秋得意忘言即便休衣錦不知公子貴山自高兮水自流問以禮接待是通行事為甚南泉打破鍋答車不橫推理無曲斷頌底事分明作者希通身毛羽似剛錐南泉打破閑家具莫向人前理是非問前三三與後三三且道是多少答晝夜一百八頌金針透出幾山頭脫體和衣得自由㘞地一聲空宇宙春來桃李趁溪流問不達法源故多諍論為甚居乎師位者東闢西闢答人平不語水平不流頌遠山風送幾千里白雲深處日輪紅撒手一拋金彈子擊破威音那畔蹤問言滿天下無口過為甚麼道口是禍門答錐頭利鑿頭方頌山色深深月影希清虛冷淡少人知識得個中消息子爾是何人我是誰問無頭無尾是甚麼不妨當堂試道看答雪峰輥的頌無尾無頭栗棘蓬當陽拈出絕狐蹤塞斷咽喉人不會昔人飛劍斬黃龍問建法幢開門戶我道好事不如無且道有甚麼過答一波纔動萬波隨頌金風吹動浪差差無底扁舟過海西釣起鉤頭波底月驚得沙鷗兩岸飛問踏翻大地尋常事踢倒乾坤當戲毬此人具甚麼力量答不為分外頌個事分明記得清牧童遙指杏花村倒轉黃河翻白浪金鱗那怕禹門深問一聲彈指樓閣門開且道彌勒在甚麼處答兩眼對兩眼頌明月家家有分大道不離方寸照破鐵壁銀山金剛腦後一頓問學道先須識自宗莫將真際雜頑空且道真際頑空如何辯別答賊是小人做頌蛟龍困臥幾千秋吐出明珠孰敢收忽遇風雲時際會紅光穿透碧峰頭問心不是佛智不是道畢竟如何即是答畫虎畫皮難畫骨知人知面不知心頌靈山千古振宗風列聖場中一線通縱有高賢留不住夜深明月掛青松
