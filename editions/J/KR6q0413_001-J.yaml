body:
  text: 侍者廣熙錄瑞鹿法孫行信編次順治甲午年六月初六日受總督兩廣大廳都督張國勛請住曹溪南華禪寺師於十月十五日進院當日總督兩廣部院大廳都督張國勛同鎮守南韶總府張瑋侄進忠暨闔山勤舊請上堂師至法座前拈疏云三千里外消息在試問諸人會也麼不是張公誠三請吾人焉肯入山阿維那宣疏畢指法座云一不做二不休放出從前六不收任他十地三賢聖看我全提向上酬遂陞座拈香云此一瓣香恭惟北闕之至尊仰祝南山之萬壽洎滿朝文武闔國公卿伏願衛國衛民爵愈高而祿愈豐立綱立紀志愈堅而功愈固又拈香云耑為現今請主都督葵軒張公及韶州道鎮府縣廳衙儒學諸位尊官并鄉紳孝廉文學遠近檀那本山耆宿惟冀生生植般若之靈根世世結菩提之種子又拈香云此一瓣香佛佛授受祖祖相傳端為本寺開山六祖大師下傳曹洞正宗第三十四世象田即念現和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象眾當觀第一義僧問寶林古剎六祖道場佛法重興請師酬唱師云千聖不傳進云今日蒙師親指示立地承當有幾人師云阿誰無分又僧問萬古乾坤一朝風月如何是南華新氣象師云一朝風月萬古乾坤進云恁麼則獨踞寰中權誘進看他天下幾知歸師云是甚麼人講恁麼話進云曹溪灘上水推磨也勝文殊向上機師云文章禮樂垂皇化劍戟干戈定太平僧禮拜師乃云義本無意如谷傳聲有響即應假名喚作第一義不過應彼來機原無拘繫既無心於彼此豈有象於去來浙中來時未嘗來錦帆高掛絕安排會得其中端的旨喫飯穿衣事事諧曹溪住定今已住始終一如無個事無中發用不尋常海納山容非容易四方八面一齊來就其爐韝不兒戲煉得身形似鶴形念念銷鎔事事備驀豎拂子云現前諸仁者聽取末後句上首復白椎云諦觀法王法法王法如是下座結制上堂拈香云這些子從來匝地普天今日拈來普天匝地熱向爐中供養象田即念老和尚用酬法乳之恩乃云年年此日有此結只為應個好時節拄杖靠壁冷光生竹篦底下黑漆漆擲拄杖云是甚麼聻高聲云不得動著問答不錄佛成道日張鎮臺請上堂盡道釋迦今日成道我道釋迦今日全身落草秪個無位真人踢著一跌便倒所以云道可道非常道十二時中休做造名可名非常名只貴一箭中紅心於中薦得端的旨喫飯穿衣本現成大休原不曰大休示現僧中為知識鎮公本不曰荊翁亦爾應身在張宅一為宗門主一為儒門客車之輪鳥之翼扶持全憑一臂力靈山別後多年也冷地相逢不相識大眾還見靈山一會儼然麼良久云還委悉麼飯罷曳笻看山色滿目青松滿耳風下座上堂曹溪從來無佛法只要諸人盡放下趙州昔日曾有語新到師僧且喫茶上堂僧問清淨本然業從何來師展兩手云清淨本然業從何來乃云若恁麼問答直下會得不落意想清淨本然業從何來然而清淨俱不得善財彈指見彌勒下座上堂南贍部州打雷北俱盧州下雨東勝神州栽苗西牛賀州長米山僧縱目一觀不出吾王國裡喝一喝下座說戒上堂三次登壇四番羯磨正眼觀來一場懡㦬大眾登壇說戒也是好事為甚麼又道是一場懡㦬卓拄杖云自從舞遍三臺後拍拍原來總是歌上堂諸佛不曾迷眾生無悟處眾生不曾悟諸佛無迷處山僧不曾說大眾無聽處大眾不曾聞山僧無說處若能透此數關古今日月古今星辰古今天地許汝善入眾藝三昧證四十二般若波羅蜜門其或未然不得動著一絲毫許何故聻人歸大國方知貴水到瀟湘一樣清下座上堂僧問全機大用請和尚道一句將來師云不打老頭皮乃云曹溪不打老頭皮佛法何曾有欠虧是耶非耶三十棒個中那許著思惟卓拄杖下座元旦上堂拈香罷乃云百年三萬六千日惟有今朝最吉祥皇恩佛德真難報每每年初三上香七尺烏藤無枝葉耀古騰今體放光秪恐諸人猶未會老大頻頻為舉揚大眾山僧舉揚去也卓拄杖一下上堂上首白椎云法筵龍象眾當觀第一義師云落二了也要會第一義麼向父母未生前會取山僧未陞座前會取大眾未雲集時會取若還不會憤丈夫志扣已而參參到極則處見天不是天地不是地山不是山水不是水向這裡翻轉身來見天依舊是天地依舊是地山水依舊是山水正是依然不改舊時人原是舊時行履處大眾且道差別在於何所良久云佛祖未生空劫外教我如何說向人僧問無法可說是名說法和尚陞座如何師云你這一問也是多的進云恁麼則四海英靈受煆煉五湖衲子盡鉗錘師云闍黎亦不在外進云垂絲釣盡千江月出海金鱗得自由師云三十棒進云輕輕提足龍門過惹得天花動地來師便打僧禮拜師卓拄杖下座解制上堂西堂心白禮拜起師豎拂云是甚麼堂云掬水月在手弄花香滿衣師云早知子如此春梅折一枝堂云中軍主將能行令不動干戈定太平師云試行一令看堂云劈開華嶽連天秀塞斷黃河水逆流師云任你就有翻雲手總在山僧掌握中堂云惟憑一滴曹溪水散作皇都內苑春師擲拂云與子一枝梅堂云不是狂兒多氣度秪因曾踏上頭關師云珍重遂付衣卷乃云垂手江頭數十秋不見金鱗吞釣鉤法戰場中能得勝拄地撐天出一頭東西南北從君去曹溪山中跡莫留騰身一擲千峰外葉落歸根始是秋舉圖書云大眾若向這裡道得一句今日與西堂同付眾無語師云印空印泥印水下座幻寄師設齋請上堂事理須知不外佛法豈可容情讓他英傑漢子一腳踏倒便行師召眾云且道向那裡去了揮拂子云從來東土無消息此去西天十萬程復舉僧問古德如何是本來空德云業障僧云如何是業障德云本來空大眾與麼會去如來禪祖師禪一串穿卻其或未然聽取一頌要知業障本來空語默言談露此宗龍歸大海滔天浪虎出山前一陣風遂下座佛誕南韶兵巡道周鎮守韶郡總府張韶州郡丞梅韶州別駕周南韶道大廳謝總府守備鄭請上堂師陞座拈香云恭惟釋迦文佛捨金輪之寶位子夜踰城脫珍御之龍衣青山斷髮又拈香云端為當今皇帝聖壽萬安欽願干戈寢息八表安康更冀滿朝文武及道鎮府廳諸位尊官生生游戲法海共作善友提攜世世廣作津梁佛法付囑有在斂衣就座云指天指地口嘮叨識得曹君罵老曹杓柄落在兒孫手未免惡水驀頭澆大眾還委悉麼拈拄杖云雲門大師來也卓一卓云國清才子貴家富小兒嬌上堂舉芭蕉因僧問如何是透法身句師曰一不得問二不得休僧云學人不會師曰第三度來與汝相見師頌曰一不問二不休法身不在嘴尖頭若然三度來相見走殺溈山水牯牛佛誕上堂今朝正是四月八處處叢林洗悉達惟有曹溪則不然從始至終無一法若謂說法度眾生淨眼無端著砂撒丈夫志氣本天然是則名為摩訶薩喝一喝下座端午上堂張聖翁問折蒲為劍如何斬魔殺鬼師云祖乃云五月五日午時書赤口毒蝎盡消除大抵候門深似海不勞枋上釘桃符喝一喝下座祖涅槃日上堂今朝正是八月三祖師示滅卸尊顏來時無口去無舌前三三與後三三下座結制上堂南華結制別無他格外風規略露些今日山僧來下釣離鉤一句辨龍蛇英靈不食鉤頭餌脫體相逢見作家還有是般人麼良久揮拂云真言無意真正無偏真悟不立真道不玄放曠無有來去縱橫不見其然只恁麼去猶涉廉纖不恁麼去掘地覓天畢竟如何大眾曹溪法道疏來久貴得其人接我肩下座問答不錄解制上堂百日期場今日解試問諸人悟未曾填溝塞壑無人會那事從來一坦平一坦平則且置如何是那事良久云墻角老梅生白玉溪頭嫩柳長黃金師到梅檀林眾弟子請上堂色心不二彼我無差迦葉微笑世尊拈花一似人前賣俏一似勾賊破家不若潯中居士各各守定生涯佛意祖意看破時中一一放下且道放下後如何秉心不負靈山囑堪作人天大丈夫下座晚參監院問如何是本來意師云本來無意進云揚眉瞬目豎拂敲床即且置請問和尚畢竟本來意在甚麼處師云即此揚眉瞬目處分明一著報君知張居士問菱角尖尖尖似錐意旨如何師云風吹柳絮毛毬走士云畢竟是甚麼意師云雨打梨花蛺蝶飛士禮拜云乞和尚分明指示師云此係圓覺經中所說居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實明明兩手分付了也妙喜恐人不會便頌云荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛將經安在上頌安在下看也得將頌安在上經安在下看也得但不得意想卜度恁麼會去便會去擬議思量無了時晚參師云我有一句子要與諸人說破恐汝開眼後罵我若不與汝說恐汝暗地裡疑我也罷看汝等俱是英俊上士特達高賢不若為汝說破良久云將謂我瞞你示眾前日昨日都說了何勞更用再躊躕學道只要心地空參禪秪貴偷心死憤憤然而用力參甕裡何曾走卻鱉會不會趙州東壁掛葫蘆金剛腦後三觔鐵喝一喝示眾雲生嶺畔風生雨雨後晴明一色天但得時中忘去就開言句句占機先示眾師以拄杖擊香卓云太煞不近人情動著胡打亂打未曾讀得古書不解之乎者也是以直不藏曲智者如聾如啞卓拄杖云哪於此若也薦得何勞東扯西扯擲拄杖下座除夕示眾爆竹聲中一歲除春風送煖入酴酥諸人打個回光看此事從來若個無參禪人豫先若不打徹臘月三十日到來眼光落地時如螃蟹落湯悔之晚矣看來當勇猛自警舊歲已過新歲又來大眾切莫唐喪光陰虛消信施異日閻羅老子盤算飯錢莫謂曹溪老漢不道豈不見只因差一念現出萬般形師到南京普惠寺眾請說法師云大辯不若訥大巧不若拙大智不如愚大音不如默世間人不肯退步看只管倚能向前壞了許多事辯士舌壞文人筆壞一切人善世事者俱被世事壞若肯退步看但將能會者一齊放下如初生孩子相似自然以混沌之氣挽迴天地之間原天地未分先有此理可見此理包乎天地若未會此理時中以智眼察之久久自會去珍重示禪人從上諸祖並無參話頭發疑情之說因今人偷心不死業習深重故方便將個話頭令人晝參夜參正要人人淘汰偷心業習耳但依此究到水窮山盡處銀山鐵壁時正與麼時過去事已過去了未來不必預思量現在心亦無所住只虛虛然隨緣過日久久定有輕安分參禪人心不恒或有一期而休者有半途而廢者或有住小院受徒眾而擔閣一生者皆是宿無靈骨於般若緣淺耳若能信力堅持深造大道管保出世無疑邇來禪者愈廣禪病愈多宗鏡詳之矣更有今時禪病略為說破或我慢自高而下視人者或心識紛飛學打口頭三昧無刻停息者或心術不端立身不正而學聖道者或空腹高心希望付授圖張虛名者禪病固多不克枚舉冀乎智者知非即捨他日共支祖道豈可量哉禪士家道不可不悟既悟捨悟名真悟福不可不脩脩如不脩名真脩悟不能捨爭奈猶存聖跡脩不能無必定心著馳求須是目前無闍黎此間無老僧始得南泉云不是心不是佛不是物說了也且道他說個甚麼不是心不是佛不是物說了也作麼生會參象田先師云天大事放下便了絲毫念縱之無窮誠哉是言也時當末法人心澆漓不遵古式纔得一知半解便肆口狂談非但不存厚道亦且長養全無秪恐臨行有失請看古人一生領眾有沐浴焚香別眾而逝者有擲筆而逝者有一喝而逝者有談笑而逝者有坐立而逝者試問諸兄能若是乎不然正所謂休良方子人皆有秪恐臨時不丈夫示渠演監院達磨西來直指單傳不立文字何等乾淨今不稽古以文字障正理用道理塞天機誤人平生豈不見少林面壁二祖安心五祖栽松六祖舂碓這一起老漢真千古規模不似如今之人苟圖虛名東也亂統西也亂做小知小見蝸角之名不惟無益於人智者傍觀可發一笑上座是老誠人但行老誠事切莫混此惡套中至囑示映輝知客達磨觀東震旦人得道者如麻似粟想子亦不在一粟之外萬望不可自棄子一發明自了而了人師恩親恩盡報也妙哉妙哉子一迷非不能度人亦且自墮苦哉苦哉示皎環上座人人本有一段光明一被物蔽則不現前也子能事理俱遣人法雙忘自然如日月當空無所不燭也示以慈長老佛法如大海公須具傾湫倒嶽之量而入法海淘鎔若以缸缽之器取去不見其淺添來不見其盈不惟不見邊表亦且徒其疲勞耳舉木椎師云百丈清規埋沒久矣本皆木作法訛將磬作椎乃擊椎云第一義一椎粉碎從他作者也愁眉掛鐘板師云既行曹溪道當扇曹洞風板宜三擊板鐘宜三擊鐘普願大眾齊出手不妨從此入圓通遂鳴
