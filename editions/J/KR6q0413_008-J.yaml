body:
  text: 侍者德瀾錄瑞鹿法孫行信編次附鎮臺張公國勛請住曹溪來書法諱愚自三請閘口拜違慈顏於十月十九日抵江寧十二月初十日鼓棹長行矣俟到粵任諸事役務少有頭緒耑使迎接吾師聽風旛話千祈慨允不勝榮荷翹首膽戀不盡依依復去冬拜送使我懸心神馳左右奈關山迢遞不克問候為歉忽接來翰方知萬福則樂然也承諭風旛教我某才疏德涼急欲覓一山窟以盡殘喘若以南華累我力弱難支請另擇高明尊宿恢復祖道況某浙中一人身羈兩剎百務勞心公亦深知胡不諒之二請書愚自舒城虔修小函差王中軍送至蓮座嗣來溯洄江水遠企慈雲如挹吾師德範茲月二十一日度庾關將至端峽矣韶陽於曹溪僅隔一水彼中為南派正宗愚懇請再整鷲塵弟子去彼匪遙得吾師駕至使菩提樹下復光乃弟子之深願粵中士民之深幸也萬萬放心振錫而來愚則已之不來不休而已矣特遣舍侄奉迎翹首錫音無既瞻切又復某自出世以來叢林七住六處開堂於中千辛萬苦不記數也此時此際荒亂交加出頭不如縮頭好進步無如退步高定隱白蓮尚不願住欲休老于深山再加一曹溪破院任在我身可謂苦中之更苦也不是生退屈實乃怕事多端若弘法者俱肯如斯法門不致寥落便恁麼休去亦不負老象田冀高明再訪達者寬宥余情三請書愚拜辭吾師曾三具荒函想俱投蓮座矣粵中情況寇賊作祟生民不得安枕回視嘉禾吾師教化之所宛然另一景界吾師何不普慈雲于炎海令吳越獨私造化耶懇其飛錫萬勿固辭駕過嶺東慈航早發使登彼岸愚敬拭一單躬迓南華道左矣弟子身沉宦海苦不可言冀法幢高豎愍心教我臨楮不勝懸切之至三復承請者三敢不奉命欲到肇慶一面不意南韶道鎮府縣預下請書南華耆舊欣然迎接於是十月十五日進山滿子昔日之願矣冀欲再會奈因結制日近戒子遠來諸事匆匆又不克如願為歉曹溪久無主法者可謂荒涼之極意欲聊拓數椽以闡宗風子宜留心與李制臺為我致意不及另草待時世少寧把臂一笑何如附汪振老書諱裕白蓮寺乃荒蕪久矣天假大和尚駐錫於茲五六年拮据之苦漸漸可觀不謂忽有粵遊聞之若為所失彼乃佛祖道場虛席以待佛祖接踵無計挽留裕恐白蓮旦夕間仍然鞠為茂草數年前荒蕪之景象復見于今日矣昨欲借重雪山師主持方丈觀其言語尚在吞吐之間必望和尚委曲慰留須在初一法駕未發之前擇一吉期請坐方丈緇侶幸甚外護幸甚和尚雖在數千里外得無顧慮矣代布不盡復某住白蓮萬苦千辛愧福薄耳承台下多方衛護且喜得安今東粵之行已決如果不負我心請再擇明眼宗匠主持方丈接納方來某心亦足矣雪首座似有西山之行領命苦苦相留乞台下作速安頓以慰我懷雪山果主白蓮附天華遠和尚書曹溪乃余之所住過極欲與和尚到菴細談其中情節三回兩度俟駕不來但吾人襟懷廓落法道從此馨香遍界此行大振吾宗也欣慶欣慶復某欲拜辭起身數四奈各府縣善信踵門拜謁不絕一刻不暇不及拜別罪歉罪歉復望吾師為法為人莫生疲倦眾生難度方便垂慈轉見師之深願耳法門凋零之際乏人弘道之時主法者以包天括地之量撐持末運是某之至禱曹溪機緣非偶舉措聽憑龍天但抱道化導用酬佛祖進退得失付之造物豈由預備哉附葵公張護法來書頃聞飛錫過庾嶺深幸吾道南來矣途路修長跋涉為勞雖筏渡不憚津梁而弟子之心則甚感且念也肅請往肇大闡性宗丐楊枝法雨普濟殘黎為望臨函神往復一載不面如間三秋逞肇之念勃勃但韶石眾護法虔請之誠似不可卻待進院後諸事少有就緒來作不請友也又上吾師重振祖庭人天歡喜弟子惄擬膜拜法座瞻仰慈光但疏節為愆彼中同衣如水乳否山川風土能容錫否將此身心奉塵剎是則名為報佛恩吾師願力弘深大千皆領法旨也舍弟素稱信心業已托為外護諒能料理俟少刻暇當晤三生石上必留弟子片席以話無生耳冗中草泐慚愧不盡又復世事如阱塵勞困人返照迴光萬中無一公人情善世道義兩全浙粵二山無不稱讚托清光遠映林下且安淡薄難支我領眾衲篾束肚皮守去可謂入定已忘三秋事起來不見四時推法喜禪悅爽我襟懷山中滋味特與公說又上自秋徂冬今且春半曾未特一走耑候弟子之罪誠莫贖矣雖吾師慈悲知我塵緣所縛而弟子寤寐之間真無處置顏面也二舍弟來肇云吾師宗風日振淡薄自甘誰為為之豈無慚汗日來制臺巡行高涼弟子居端城守冗忙更甚茲以鱗便附候慈祉即差員虔叩不一又復殘冬接來翰深知公冗為羈邇來國事匆匆莫生罷倦更宜耐心耐意煆煉真空但恁麼去則事理不外也令侄至深知來意山中諸事色色妥當不勞掛心老僧放出補袞調羹手撥轉如來正法輪呵呵又上吾師南來梵臘階前禪心江上祖庭自當大轉法輪矣但弟子去歲自秋暨冬靡盬晝夜而硜硜株守味澹如水一切餽遺概為峻謝即獻歲方升不遑馳一介叩賀慈祉不特地主之誼歉然且拈花以上椒頌俱為缺節罪誠莫逭藉和尚慈悲或邀懺釋耳待地方調劑之後當有餘暇拜晤金容以消積歉秪此附候新禧不既神往又復自進院以來說戒三壇結制兩期百務匆匆不及遣人問候彼此相思何緣一面某亦諒公想公定諒我也今應元長老舊為南華住持甚的當因水月當家輪著即退任而任之也亦是我門下老弟子乞清目垂顧將水月轉為法地浩歸四方衲子亦在公一臂之力耳小徒來久何以不回懸念懸念乞發行為快衷曲之談筆下難盡秋末冬初盤譚不宣又上我師重振祖庭緇素雲集可謂法海信哉道高龍虎伏者也使人人盡歡喜讚嘆得所未有但弟子一官束縛未得頓脫塵緣碧水青山徒有神往然而二十餘年戰場味如嚼蠟到頭一著未猛惺將圖兩隻芒鞋一個蒲團孤雲野鶴五葉一枝亦願侍從蓮花座下也不識吾師許可否前兩師兄來端諗悉道範清吉捧誦月上三更坐釣臺之句尤感吾師接度之切具大手眼領教與惠漢水峨山不足喻高深也侍師回南華無物將敬聊吟近作錄之扇頭請政幸叱存又復渴想君家神馳久矣忽接來翰爽我心目山僧以麤言冒瀆公不介懷可謂言外取意小徒在府承惠擾齋傳聞公之切心道心使我愚師徒飽領清誨我亦放心行道也闔山耆舊欲來拜謝公請山僧住持曹溪真水乳相合也闔山相安也山門穩固則法道凋而再整枯木謝以重榮全賴吾人之力耳又上祖庭一席風冽山寒弟子三月登埤疲于奔命茲者責任亦無能為也吾師法眼視之特蝸角耳獨弟子終日匆忙勞怨叢集蠅鑽故紙不克一了究竟吾師婆心甚切乞為弟子下一金篦何如節屆青陽冗甚未遑耑役奉賀又復某以法眼觀之如飲淡水如刀剖空用世眼觀之蠅鑽故紙誠哉是言矣幸有此心此念切不可忘忽時鑽透方識天外天不待問人也附聖翁張太老書諱世臣數日不聞問諒法體康泰祖庭諸事已整頓有緒矣幾番欲趨侍猊座載聆塵譚弟子為俗務所羈弗克如願適蒙手教儼然耳提面命深慰企思眼前雖不能即居山谷然于此事亦知用心爭奈只在心性義理上穿鑿疑不發起古德有言若事上覷則疾若在意根下思量卜度即沒交涉如何是向事上覷下手工夫乞和尚直捷指示弟子依而行之至懇至懇復接尊翰方知前字已蒙台覽矣承問事上如何下手老休有一問盡大地俱是事且道向何處覓理試拈出事看若拈不出依舊賊入空屋且問說事的又是個甚麼即如僧問雲門如何是佛門云乾屎橛老休云說了也且道他說個甚麼老休云乾屎橛喚作事得麼便恁麼會略較些子乞老居士舉起慧劍一揮兩段將此葛藤椿送到東洋大海外則可也豈不聞知之一字眾禍之門正此之謂歟又上弟子在熱鬧場中輥了一世自己安身立命處全未打點幸得諦聽法旨覺此中恍然有躍的光景及離座下仍復憤憤不知是業深根鈍于此事無緣耶抑年老氣衰弗能承當耶或心不真實志未決定耶懇請開示諒大師老婆心切當必為我直指也霜林寒色大異城中願言珍攝以葆天和有懷如縷嗣容面悉又復前在韶城過蒙鼎力真一箭射入九霄也青天亦須喫棒但向後亦宜筈筈相承自然箭箭中的也文武須知不外則事理盡在其中何有老少之分別根基之純鈍耶來云躍然的光景此乃塵心暫歇一時輕安老居士根性勇利拂塵而行久久自然相應若依舊涉事依舊走作喚熟習難忘要到四稜踏地不亦難乎必須退居山谷晝夜用心管保歸家穩坐也然雖年尊色力尚健氣宇過人參究此道綽綽有餘萬不可中途生倦失老休之望也寄張鎮臺書諱瑋屢承厚誼感佩殊深此因非淺定在靈山同願今日方滿也賜額一至草木增輝即法堂前煥然一新矣更冀移玉入山為戒壇主盟山門有慶眾僧有慶即山野亦有慶也是望復周道臺書諱日燦捧讀琅函超超玄著非受靈山之囑能于紅塵堆裡作世外想耶從來佛法付與大臣如趙清獻張無盡蘇子瞻黃山谷以宰官而傳祖燈尤彰明昭著者也昔憨大師弘法曹溪君家海門居士竭力扶持至今傳為美談浴佛戒期承高軒往顧泉石增輝某披拂汪懷澄之不清撓之不濁可勝慶快且蒙賜佳額名聯字字珠璣前無古人後無作者藏之祖室永鎮伽藍當與天壤同不朽耳公事之餘倘惠然命駕入理深談一番了過去生中般若因緣此大丈夫之所為而某之所喜出望外者也夏日炎蒸惟冀台臺為道為天下自愛臨楮曷勝瞻依寄南雄鄭太尊書諱龍光某在浙中聞清名耳熱及至南雄不敢擅自造謁權住青蓮剛兩三日張公促行又不克一面為歉承游揚張鎮臺何太尊色色周全或往來其間乞致謝一聲于是月結制也但齋糧乏少僧眾來多特遣小徒拜謝或有外緣為我指南寄韶州何太尊書諱鳴鳳屢承厚貺感佩殊深山中頗安全賴覆庇某時抱五內前聞道體違和某甚懸念特差小徒問候想弗藥有喜也鄙寺前住持已退今有一老誠者某見其為人近古勸任住持接待高賓乞台臺垂青為幸寄韶州梅二府諱欽老老大大尚沒料理雖擔世外之名竟業識忙忙為尋歸路有違尊召至今歉然幸相忘形外恕我可也周岐老進山某亦面訂至端午後偕駕同來某灑掃苔徑迎于南華道左矣復韶州周三府諱憲章城中握別又易一冬可見光陰如電山野常切切于斯如夢不來又隔一生也台下神情凜烈雅致清高某時復三思不審台臺不棄山野乎托清光遠映是月結制也臘月初一日說三壇大戒乞駕進山一敘以慰我懷復曲江諶縣尊書諱紹津恭惟大居士台臺豫章宗匠盛世循良筆端吐造化鹿鳴興歌心上起經綸牛刀暫試喜燕臺之市駿在即幸雲山之付囑未忘其藏拙亞地深愧入廛仰瞻德容飲醇心醉正擬借光于戒室猥蒙隆施于山廚禪流之枵腹果然檀那之慶餘無既肅楮申謝嗣容圖晤清誨不盡復曾旅老書諱弘久向道雅不克瞻依拽杖南遊為尋知己台臺高名朗于寰宇某未發足以前早與神契也粵中土廣人稀相逢者少即今垂鉤四海為釣獰龍未卜台臺不棄山野否寄滄然侍者書數旬不見使我夢寐心驚云莫非中道而止之耶俗務牽纏耶不然何不過我以完未了公案世事如身之與影愈走而愈急也貴乎識得破就陰而止之則影自消也跡自滅也山中諸事極妥四方衲子如雲觀曹溪風景當有興色但我丈室無人談談希子速來慰我神馳不盡寄德盟黃道人書山中寂寞無可談心公何意久假不歸懸念懸念爾我飄然方外真如泡影何勞奔馳于聲色之場乎千祈策杖而回慰我遐思寄五倫侄果然出家即坤雷自到浙中不無眷想母兄俱亡時痛切焉我在外晝夜忘眠為成道業道業已成又承先象田將法門大事累身因不敢負先人苦心咬定牙關恢弘祖道以報先祖道以報爾先祖母一片撫育之心正是一子出家九族生天也舊歲有朗徹禪人為眾多特往吾里募米方見吾侄親筆來書兼以道心深信三寶今又差雷空書記自如禪人一同過我求出世法趁汝後生時還可策勵二侄分付他守定家業汝一一倒斷來自有安頓之方所謂即今要休便休去欲覓了時無了時至囑寄本源和尚書時景易過轉眼風光不覺二秋矣侍者來時弟尚望兄候至冬底法駕不來不知何阻使我歉然浙中衲子檀護根基純熟彼此信然不料張葵老夙以願力興復曹溪七月初一日乘舟初二日長行湖嘉四眾不勝依依南華機緣甚偶弟欲恢復然而孤掌不浪鳴特令默之來請乞兄偕往庶滿昔日同參之願耳更冀舉起慧劍斬斷葛藤撩起便行垂模萬古舟次匆匆不盡欲言南都翹首細談衷曲與密宗庫司書古聖遺訓云作福如搶寶在吾徒不惟搶寶亦寶內擇其至寶也叢林一肩擔當盡心料理使老僧安心行道來眾依棲在子一人之力耳貴乎如悉達取寶入海不見其深沒頭沒腦全身在裏許一踏到底管保唾手而得矣復天界浪和尚書此際法門下衰宗風寥落在乎老人坐振此道使洞宗源遠流長也此行某仗老人慈光庇蔭南華再整六祖重輝某在東粵焚香頂禮不盡寄穀山金峰和尚書弁山法道海內橫行在乎吾師之力耳乃先人高明遠見付授四十餘人彼時小見局隅之流皆紛紛議論不料末法全賴諸善知識慈航普渡庶使茲輩杜詞抱愧流落在常行粥飯僧數裡某道過南華聞和尚法道之隆僧俗讚嘆不已某亦欣然惜乎弁山諸善知識長往者多幫手又少似覺法門寥落某則茫然無措幸吾師在急流中下一柱石且喜老雲門道振天南也寄汪爾老護法書諱挺去秋握別倏爾金風又至矣流光如電誠不我待也台臺近履更勝否造詣更精否太封翁萬福否冀一一回音慰我遐思某在天南荷台臺庥庇四眾欣欣龍象常盈數千乃六祖遺風尚在耳山僧鼓舞餘勇痛加鉗錘但得法雲四出則此一番公案畢也白蓮乞大護法加覆之今差小徒耑候清吉端溪一方引意惟希鑒茹不既寄實行兄書自江寧一別不覺一秋也一路切念我兄熱腸奈因行促不克細細盤桓令人歉然于十月十五日曹溪進院也結制說戒來眾益多托兄之福內外俱安弟孤雲野鶴翩翩無侶如江寧事畢速還南華釋弟之遠望
