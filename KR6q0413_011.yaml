body:
  text: 侍者廣熙録瑞鹿法孫行信編次晟溪衆居士請利濟寺普說師云昨日為賓客今朝作主人離卻賓主句個裏始相親良久云大衆還相親也未其或未然山僧為汝葛藤一上所以三寶是人間福田世出世間若聖若賢若富若貴皆從斯門流出如水以江海為源源不流水萬物何以發生水性本無高下在乎受者各適其宜在聖四相皆空五蘊匪有翛然物外作世間人然後興慈運悲向五濁境中垂手拔濟三有衆生出生入死于三寶門中在凡仗叢林種福田依知識為恃怙皈心投誠時聞法樂則近道也晟溪雖是一方善地乏一接衆之所幸本村居士各房衆等募造藏堂殿宇為十方賢聖相聚參究之地成辦道業一人出世多人無異矣此事不論僧俗但信得極刻苦參究視眷屬如路邊人只借路徑過無絲毫情念污染心田無事于心無心于事即名出塵上士世人心相不定近善則善生近惡則惡起此剎興則四方善者相從善根堅固惡境遠離則惡念不生四生六道管保不墮善根堅固世世生生佛階可期秪如善惡兩忘復是何物卓拄杖云不起纖毫善惡心來去須教常自在沈仰疇居士問弟子誦金剛經且道從何門而入師拈拄杖云從這裏入沈云不會師云不會正相應蔡仰橋居士胡跪云請和尚細說四句偈師良久云說過了也蔡不起更要和尚慈悲師云才說四句皆是接引實指不得一法為定山僧即與汝事相上發明真實達道人目前無是非爾我之相一味如初生孩子相似雖然啼叫自若不見有彼此是非之相此名無我相既然無彼無此也不見有身心世界雖住世界猶若空華則無人相也衆生者衆念俱生故名衆生既彼此是非不可得身心世界不可得然後將不可得亦不可得則無衆生相也衆生相既無朝生暮死也得山崩地裂也得并無一念貪生怕死此則無壽者相也蔡禮拜起吳三錫居士問既不得者分付阿誰師云阿誰要分付吳禮拜起云正要請問和尚師云自起自倒下座立兩序普說僧問參禪學道秪為了脫生死且道生死作麼生了師云從來不掛一絲毫撒手逍遙無奇特進云如何是無奇特的事師云背後薦取僧頓足云莫非是這個麼師笑云似乎猜乃云參禪貴了生死僧問作麼生了山僧為汝點出識得生死根源方可了得我慢貢高是生死人我是非是生死貪嗔癡愛是生死慳貪疾妒是生死目前業力覆卻自己本有光明胸中妄想紛紛無刻凝靜是生死但將上來這些病根一一脫落二六時中虛虛然不與萬物為伴侶恍恍然不涉境風蕩蕩然如鳥飛空自然塵勞迥脫本有光明率爾通達若有一毫不盡他日在閻老手中喫鐵棒莫言山僧不道上來恁麼話說須是無諸己而後非諸人若自不能正而欲正人者無有是處山僧是龍門石雨師翁付囑的命嗣象田然象田論老人門下是弟兄而復嗣接者豈非山僧無我無人既然無我無人豈非自正而正人者乎若也攀高頭圖虛名苟非其實則吾不為也從上諸祖只為汝等空腹高心自高自大渾身輥在生死窟裡故建法幢立規矩淘汰諸人業根奈汝等見善知識多了便生輕忽正眼不開那識主者鼻孔端正東邊不住又向西奔不肯虛心請益亂走一生白首無成真可惜許而今人心澆漓古風將墜山僧行腳時一進方丈不弄虛頭一味傾心陳白某如是參如是見如是受用以求決擇是非可否若是某便與麼去若不是更如何用心得徹透去爾密和尚向某搖手大笑一聲又參三年方得目前無礙談說無礙三年無綿襖五年沒小衣不似今人穿長直身戴大帽子撇臂做大老山僧見汝等昂昂然只恐生死岸頭總用不著父母生汝身朋友長汝志為甚耳伏下流汝之不悟也有緣故汝之夭壽也有緣故汝之愚癡也有緣故乃至薄福少德各各有緣故在山僧白蓮初住執事不周今定者欲舉賢才重道德如國家之興必有良佐叢林之興全在執事執事竭力則大衆安和大衆安則山僧亦安山僧安則衆亦安心造道祖道之興從此而致即禪和立品當知乎時識乎節初出家時行盡苦行細窮道理熟覽遺言理路通戒律精然後參禪若有悟處求真善知識決斷再諒己之能而加操履學問氣象天資福報四者缺一不可若有氣象學問不通還可操履若四種俱無不若把茅蓋頭把本修行庶不取笑識者若假裝禪相詐現威儀求彼恭敬只恐跎子喫仰跌兩頭不著實汝若悟處固深自然波浪也闊發用如海水奔潮遮攔不住良久喝一喝云百千涇流皆歸這裏下座護法請普說師云時當末法人多乾慧有說到行不到者有行到說不到者有行說俱到者有行說俱不到者若是說到行不到者口中說得千般妙腳下難忘半點塵若是行到說不到者腳下雖無半點塵口中難說千般妙若是行說俱不到者無目之人沿壁走忽然不覺墮深坑若是行說俱到者口中能說千般妙腳下全無半點塵所以達磨大師道向後說道者多行道者少當今要一法眼清明指示後人者即為難得若看語録學轉語拈弄偈頌以相似語言為人師者只恐你腳跟下猶有絆索在倘遇萬緣交加之際逆順境界之時便耳紅面赤此是從文字而入者其力未充豈非說到行不到之過咎歟從此一念知非捫心自悔遇有礙處放不過即名懷下聖胎久久恁麼去定有脫落時節在若自欺不悔只掠虛頭則自瞞瞞人終日渾帳過日若遇明眼宗師但將手搖向汝兩搖早已七上八落了也明眼人覷破不肯你則諸天鬼神亦不肯你既不達道而弘道豈非自欺乎若是行到說到者日用轉轆轆地在天而天在人而人在四生六道隨類現形不曾動著一絲毫許若是行說俱不到者當住叢林入海衆親近知識如慈母相似寸步莫離發堅固心行菩薩行自然福至心靈昏眼一開善聞法樂甕中不怕走卻鱉山僧不是好為人師觀法門寥落祖道衰微大丈夫在天地間當立身行道如天普蓋似地普擎法雨均霑三草二木悉得受潤若也苟圖安逸耽聲聞行則被佛祖所呵今有一種法眼不明不能觀機逗教一味昏懂懂東西不辨南北不分只要出世為善知識無慚愧相豎我慢幢三家村裏瞞神嚇鬼豈不是見小利則大事不成欲速則不達當割速成之病根庶脫招愆之過患不然非但自誤亦且誤人可不戒歟昔亮座主遁跡西山守山終身不出世楄擔拾橡栗為食大梅以荷葉為衣還說他不繼祖位得麼汝等一無所長免強作麼果然悟徹底人天機一發不看一字不記一語打開胸中寶藏運出自己家珍名理無礙事無礙事理無礙事事無礙名無盡藏亦名三昧總持辨才陀羅尼說之不竭用之無窮塵說剎說熾然說無間歇說說之不可說不可說不可說轉不可說不可說說亦無間歇方融世法即佛法佛法即世法若佛法世法不相融名解語之流且居門外直須佛法不住世法不居不居之念亦不居到這裡始有語話分山僧常悲人心狹劣捨智隨愚若也把住不肯放行不但難領汪洋之佛法往往望風而退若也放開便見雍雍肅肅仰止方展旋轉乾坤之手段下斷送衲子命根之鉗錘汝諸人既來白蓮門下一番當各各具如是作略如是氣宇始不負山僧苦口切囑山僧因初住恐人心不安故下身行道將佛法漫天放去把世法匝地收來今日因衆請普說不覺葛藤滿地葛藤且置因齊慶讚一句又作麼生這些說話五味調湯今朝施主在東方馮陳褚衛蔣沈韓楊拽拄杖歸方丈南潯衆居士請普說欲識佛性義當觀時節因緣時節若至其理自彰豎拂子云大衆是自彰的理耶時節因緣耶適才雨落地下濕而今天晴日頭出雨落濕日頭出為甚諸人會不得會不得山僧為汝細剖柝波羅提尊者曰在胎曰身在世曰人在眼曰見在耳曰聞在鼻辨香在舌談論在手捉拏在足奔運應用現在一切不用體亦無形識者名之佛性不識喚作精魂山僧不然識者曰之精魂不識曰之佛性所以達磨西來直指人心見性成佛故對梁武道不識何曾有長篇大章汙染當人耶邇來法門混濫或貪名圖利者或是非攻兢者人我不除妄爭優劣總是生滅心行耳克紹真乘得不愧乎嗟哉癡人大丈夫生於天地之間棄俗為僧欲超凡入聖利己利人詎可貪小小聲名將光陰唐喪山僧深為嘆息正恐袈裟下失卻人身實為苦爾若根劣志微不能直下領略從上列祖皆有方便但將個話頭朝參暮參如敲門瓦礫相似忽然擊開漆桶方得歸家穩坐諸人不可自棄人人可以為堯舜人人可以為聖賢幸生中國六根具足況善知識滿目紛然汝自生退屈不肯依棲甘服下流以圖安樂得不哀哉所以建法幢立宗旨六種成就以接待之不過要汝諸人歇下狂心各知本有不然他日改頭換面莫言山僧不道此說是棒打石人頭𥗋𥗋論實事使汝知非今日衆居士揮金辦供請山僧舉揚此事大衆須當真實參究參得真悟也真出言吐語直心直行若假說悟由粧點知識求彼恭敬則放僻邪侈無所不至山僧常嘆云深嗟末法實堪悲凡夫求情付拂衣老儂秪貴門庭鬧不肯痛苦下鉗錘你若真得悟明日用之際能一念不動乎遇逆遇順能坦蕩蕩乎睡夢之中不顛倒乎惡病纏身得自在乎若悟處不真受用不著順則生喜逆則生嗔喜怒之念萌於心鬱勃於色見於面便見生死宛然山僧苦口相勸各各深知利害昔洞山價禪師預知時至辭衆端坐而逝衆號痛不止師忽開目呵誡復辦愚癡齊畢入棺長往九峰三遍出定太首座香煙起處便去鼓山看壽塔而坐逝灌溪走七步立地而亡鄧隱倒終于五臺山你看上古真操實履從唐宋以來往往如是皆因行解相應而今求一真實為道者鮮矣故生在正法時唯恐揀擇時當末法唯恐不揀擇當具法眼別是非庶幾得歸於正路上來如許叨呾還有一句子分付諸人擲拂子云這裏若能親薦得何必當來問彌勒下座師誕日執事請普說師拈如意云這個人人本具個個不無秪為無明蓋卻行人到此盡模糊諸人有不遠千里而來者有百里而來者所為何事蓋欲決了生死成辦道業出永劫之輪回耳然欲出輪回甚難實甚易爾若是有一點情念愛念胸中不能消殞即便為情愛所移不免輪回是為生死所以甚難若識得破跳得過即出輪回是為甚易如是易得去毀也如是譽也如是若能一切俱如是則無明煩惱也關汝不著貪嗔癡愛也關汝不著生死輪回也關汝不著則倏然物外成佛作祖之基本唾手而得也一得之後穿衣喫飯也尋常行住坐臥也尋常名為達道人生生世世於佛法中出生入死為善知識以悲願心廣度群迷則知山僧此說亦不虛也不然被上來如許貪嗔癡愛無明煩惱染著墮輪回入六道生生苦趣世世波吒再為汝說個行的道理世人在此五濁境中爬起跌倒若胸中妄想紛紛不達真理此名跌倒內有細惑不除外見六塵粗相些些境界現前有礙有絆此名跌倒欲要不跌倒直須內不見有根身器界外不見有山河大地但與麼驀直去再為汝說個譬喻若謂世間山川草木澗水溪聲松直柏曲人馬駢闐千紅萬紫以為礙汝卻得掃盡三千大千世界諸有物像讓汝成道不則山也憑他水也憑他松直柏曲也憑他人馬駢闐也憑他千紅萬紫也憑他但目前無法義在目前若於事上通無事見色聞聲不用聾此一說是對機而發你若諸色相無礙即目前義也莫存佛也不為衆生也不做虛虛然迥出二邊之表放下如意便是這樣個人下座
