body:
  text: 侍者廣熙録瑞鹿法孫行信編次南華寺安衆普説大海水波浪浩渺何曾有意禪和子機鋒峻利盡屬無心大事不由人計較做來自然恰好小哉只用小見識説法難以投機曹溪乃天下之法席兒孫遍滿大地即今祖庭攤損避懶者袖手旁觀孰肯支撑然而成與不成聽憑龍天擁護但主法者具此心念庶不上愧祖師下接後昆蓋此道場自六祖去後冷落千餘載憨大師謝世又經三十秋法門衰相祖道荒涼慕道者無人接引發心者無人提持緬想心酸痛哭流涕山僧既入祖師門當行祖師事六祖和尚憨山大師所立法則不可違犯所行規矩依而行之不可動著一絲毫許何故佛佛道同豈有他哉所有百房八百年來立定亦為擁護山門守定故基實非分外善知識難得接續甚虧百房勤舊衆等鎮守而有今日相聚之期大人宜用大見識包羅萬象向道者皆入吾門所以山僧以此管見略窺大道不貪浙中叢林之次第一旦卸卻曳杖南行者正為此也曹溪門下五千大衆有志向道者甚多若能一念回機便同本得何愁法道不布衍於天下況此際世亂紛紛多事之秋貴吾人深山窮谷修行以善法障回百川使國家安而天下平萬民樂業正所謂最尊最貴法王孫圖名圖利被人輕但願大衆守分過時比世碌碌者何啻萬倍哉若然爾即是我我即是爾爾即是祖祖即是爾佛祖不是別人便是不起衆生念衆職事既領其職當知我心山門八字打開要來者任他來要去者任他去莫分貧富貴賤休別智慧愚癡恁麼就是法法平等無有高下則人人霑其利益方合道人本懷且道如何行履會得吾言良久云遇曲逢灣無彼此凹凸高低一坦平珍重結制普説掣風掣顛老頭陀天下禪和沒奈何佛來祖來齊喫棒大都年老變成魔師良久云三世諸佛如是説歷代祖師如是説天下老和尚如是説山僧今日如是説要知所有一切法為治一切心若無一切心何用一切法既無一切法則三世諸佛不恁麼説歷代祖師不恁麼説天下老和尚不恁麼説山僧亦不恁麼説嗟哉末法之人信根淺薄智力衰微不肯刻苦參究焉能徹法源底或一年半載略用功夫以聰明見領略一知半解認著個主人公逢人便喝為師不下鉗錘懡㦬放過使野犴遍地瞞昧人家男女正是一盲引衆盲相牽入火坑若有法與人名野犴鳴説法無可説名曰獅子吼正是義中無句句中無義如五臺山上雲蒸飯如此説不妨熾然説若以文字塞人天機若以道理障人真智非但不能為人天眼目抱甕之流自了無暇大衆生死事大各各扣己而參一時一刻清淨一時一刻是佛然而清淨俱不執何勞更問祖師禪説戒普説大衆今夜羯磨明日説戒身三口四之愆尤從頭發露俱消雪所以道罪性本空猶心造心若忘時罪亦忘心忘罪滅兩皆空是則名為真懺悔若忘心自忘物忘物則忘人人物俱忘看是何物這裡識得破善入戒體去來本自在真心任遍知其或未然古人道著相持戒生天福猶如仰箭射虛空勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地有等外道聞恁麼説他也道無為無為末法當代去聖時遙如粵地天邊之所無智人辨別竟遞相聾瞽瞎人眼目又扯無為無所不為便縱行淫怒癡廣肆殺害亦曰無妨罪過罪過如山僧不涉世諦遠離塵囂心中亦無遠離之念信口道來不假思議自然恰好從朝至暮覓絲毫生相不可得覓絲毫滅相不可得將不可得又不可得又不妨應用于千差此名無為無所不為山僧為諸人説破當捨妄歸真皈依佛佛者自性之覺體皈依法法者一念心清淨皈依僧僧者即自性之真體也如此自心受持不涉外緣即不皈依邪魔外道外道者心外有法名為外道或見光見花見佛見菩薩幢幡寶蓋童子來迎俱是外道魔王眷屬在正教觀來趁出法海邊外永不聞佛法之名何故謗大般若畢竟如何即是我要你正不許邪要你是不許非要你上不許下前有僧問山僧如何是向上事山僧向他道但莫向下語既如然事事如然大衆粵地法道無聞善知識難遇當生慶幸不可空過時光努力今生須了卻莫教永劫受餘殃下座解制普説師云龍牙道天下名山到因腳辛苦多年與襪著而今老大不能行手裡把柄破木杓又五祖演道腳也不能著草鞋手也不能把木杓端坐受供養施主常安樂又千巖常云盡大地是隻破草鞋盡大地是個破木杓要把便把要著便著佛祖何曾摸得著山僧則不然到晚歸單長伸腳爬下眠床便著襪日食三餐即便休沒有工夫去摸索向摸索時摸到無可摸開眼也著無可摸處再摸索合眼也著正謂時逢末運山僧以不欺之心為諸人點破今時參禪人認著昭昭靈靈為主人公縱有省悟處悟迹猶存己見尚在騎個驢兒不肯下不道不是怎奈矮子泥壁不肯虛心親覲明眼師家煆煉見地不辨青黃性理一味儱侗自瞞瞞人自欺欺人正是一盲引衆盲不特今人如是即古亦如然石霜禪師有泰首座請益霜云一條白練去古廟香爐去冷湫湫的去一念萬年去古人素朴得師一語便恁麼二十年後石霜圓寂衆擬請首座居方丈位時九峰為侍者乃曰會得先師意某亦執侍遂問曰餘俱不問秪如先師道一條白練去作麼生會泰云此明一色邊事峰不肯泰云不肯某那峰曰是泰云裝香來香煙起處泰便脫去峰撫背曰坐脫立亡即不無先師意旨未夢見在且道過在甚麼處只解恁麼去不解恁麼來可謂智眼不圓見處遍枯昔婆子燒菴也為坐在者裡若會得九峰不肯首座便會婆子燒菴會得婆子燒菴便會高峰睹五祖演真贊得省因雪巖問著無夢無想便去不得復疑又參數載忽夜枕子墮地方得瞥地古人亦云悟後若不遇人必定杜撰為人不得山僧往往見僧入門擬呈見解大棒打出正為不許坐在淨白地上不見馬大師參見南嶽讓得旨之後直往江西讓遣僧探問有語記將來正值上堂云自從胡亂後三十年不少鹽醬大衆你看他徹的人出言吐語你還知解得他麼便是徹底掀翻和窠摟碎渾身跳入法海方可利生接物放口説禪各各摸索看還相應也未若未相應莫道無事好若真有悟入處不存悟迹十二時中灑灑落落離對待絶是非無絲毫隔礙通身慶快機辨縱橫名曰度人師方登祖位作衆人之依止亦名菩薩應世更有一種參禪人少有見地見地不脫遇逆順境便過不得胸中逼逼塞塞通身窒礙此人決定不了生死山僧在天童親近密老和尚正擬此事在方丈外聞有人言無心方合道即身心廓落一輕得個入處便進方丈問曰若人識得心大地無寸土某即今覓心了不可得又識個甚麼心密云你即今在甚麼處遂頓足云在者裡密云你且去明日來復到顯聖參爾和尚才擬問爾大笑推出山僧擬又參三年一日正疑此事值穿衣時似乎乾坤翻轉四大分散方得目前無礙受用自在機辨縱橫大衆山僧將古今一齊拈出了也還有末後一句説向諸人顧視左右云路遠夜長休把火直須當道與人看擲拂子下座普説付法一事付無所付於無所付中接引人人歸正路耳況此事人人本具個個不無在善知識淘汰成就使大者大成小者小就既將佛祖慧命委付共人自然拳拳服膺守持勿失久則道力自充不覺為出世人矣山僧既蒙寶壽雨師翁將象田一枝兩手分付我不忍斷故接之若據本懷舉世無可我意者若一味單提格外一著子令一切人攀攬不著雖使宗風振於當世後絶無人得不辜負先人一片苦心乎況世亂紛紛光景不長危如壘卵恐一不測將象田一脈斷卻得不愧於心乎丙戌余主越城天華寺只得放倒頭來付囑幾人正使宗風不致寂寥後學還有依棲或天下善知識乃至一省一府一縣一山成就他為人啓迪後昆縱是佛來與祖來一一收歸法海裡益之也廣利之也深如博山亦是大善知識開堂二十餘年未曾付囑一人使江西法道寂寥會下縱有英靈之士不過為粥飯主人耳天奇付三百七十人唯無聞聰一枝天童接起宗風大振海內洞山亦付四十餘人唯雲居膺一枝雲門湛然祖翁接起兒孫遍滿天下若非上人高明遠見焉有今日事出世弘道與獨覺自了實天地懸殊諸人胡不看大人之用心乎若守定一隅淺見薄識名小家子祖庭傾頽無人恢復衲子挑包無有投奔故大聖興慈建叢林立法則興教化者正為此也子問付法之益故將本意酬之千個參學者不如一省發者千個省發者不如一付法者千個付法者不如一出世者以此較之付法出世者必有長不付法而流落者必有短長短岐分子當自辨珍重普説乃云大凡善知識向古人説不到處説學人向聞所未聞處聞説不到處説只貴悟徹源頭七通八達目前無礙自然談説亦無礙不見巖頭示雪峰語直須一一向自己胸中流出方乃蓋天蓋地法性汪洋波瀾闊大滔滔不竭名辨才無礙三昧若能全身跳入法海中信口説禪如壯士伸臂自然省力有義路話易説易聞無義路話難説難聞不見古德云五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎鎚子三個猢猻夜簸錢如朝宗和尚頌三界惟心萬法惟識曰唐家濱裡沈秀才頭上頂個木棺材手裡拏片車戽板白眼洋洋叫死來又頌藏身處沒蹤迹沒蹤迹處莫藏身話三十夜裡月亮堂堂我去看稻賊來偷秧翻身跳板頭上夾頭毛一把揪來端端是個和尚你看他豈不是信口説麼學者若漆桶不破實是難聞欲為人天師範須效朝宗和尚法則邇來輕意為人師者問著口裡水漉漉地勉強支吾倘有施主請上堂小參晝夜不安叉手尋思似鬥袈裟縱然鬥來是片錦繡有甚麼交涉粗看則有文理細看無有益處後學初機無可開豁致使學文字語言看詩韻學平仄做詩偈空過時光失正修行路日用施為一味莊點無明滿肚此皆今時人之習氣嗟哉生死命根不斷臨終之際要死不能死要活不能活懡㦬而去到眼光落地之時悔亦晚也若真正達道之人由他罵由他譽禮三拜不喜打三拳不嗔一味平等如須彌山相似八風撼而不動管保出世無疑矣珍重珍重參頭問香煙繚亂燈燭煌煌正與麼時請師拈出師舉杖云一條拄杖兩人扶進云口説譊訛無淵底推門落臼總歸源師云你這些葛藤從那裡來參頭便喝師便打進云恁麼則夜半泥牛吼日午打三更師云不是時節進云須彌山上紅波滾大洋海底火燒天師云照顧眉毛進云一腳踏翻流水路南山下雨北山晴師云露下座戒子請普説師豎如意云四生六道皆為此事不明所以爭名奪利此乃一念未覺喚作無明不覺生三細忽然一起轉為境界見於六根名為境界為緣長六粗此教家極則之談宗門參究掃盡根本無明要你當人徹去若見得徹透撮土成金直指三細六粗了不可得庶幾免地獄三途之苦所以道得人身如大地之土為僧如爪上之土為僧如大地之土參禪如爪上之土參禪者如大地之土于中悟道出世者如爪上之土況生逢中國六根具足難得中之難得耳諸人不可放過乃佛乃祖不得已而為之建叢林立規矩説個參禪説個律儀不過陶汰當人習氣乃至傳衣付法傳者傳此事付者付此事悟道成聖者成此事此事既明方免流浪六道若一念嗔心起遞相攻兢即受虎狼蛇毒之報不見波斯匿王請佛齋時佛指螻蟻云此蟻從七佛時曾為蟻身至今尚在可見一失人身萬劫不復豈虛語哉佛祖出世具大慈大悲奈業報使然豈能替之乎即此時人心遷變喜怒不常姦心巧計業滿貫盈遂感時世大變殺戮可止之乎然一日萬死萬生者只為業心不盡耳若能一身清淨則多身清淨度一衆生即能度大地衆生領一人造業則能令大地人造業古人訓導防於未萌千崖禪師云要做出家人須行四種事參禪為第一持戒為第二作福為第三禮誦為第四而今只好口説時當末法僧行衰微欲真參實究者鮮矣參不真誠去道轉遠出家人難行能行難忍能忍是道人之本懷若苟圖安逸虛消白日柴不搬一束菜不擇一莖不思農夫勞役之苦不去回光返照可不嘆耶不見大慧和尚云近來有三種僧上者坐禪習定中者點筆作詩下者圍爐説食豈為道乎若然父母空生汝身朋友枉增汝志師長虛為剃度天地虛為蓋載得不負四恩乎所以山僧細細説者要汝戒慎恐懼使不落三途況此事人人本具個個不無豈可唐喪光陰若一念精進道眼圓明即上報四重之恩下濟三途之苦可受人供養可使在家人邀福懺罪始得不愧若不勉力行持他生改頭換面雖有大慈大悲心無可替得近來主法人多如我密印説老婆禪者極少為知識出言吐語莫不皆親履實踐正以斯道覺斯民安貴口耳之學也而今為人師者不可為法式為徒者不可為教誨皆由人我不除妄爭優劣豈可作人天眼目乎不見汾陽三召不赴詎同今時土地廟裡出世沿街尋院開堂法道下衰誠為痛心奈何時當末法山僧未嘗有意致身人前初住象田時把衣單文書散盡仍欲陸沉衆中願不能果遂住靜於滃洲深山若將終身無奈越中三請之誠只得混入此惡套中免使法門寥落近為師者不以菩薩心而為事雖有三百五百舉目皆是後生晚輩或有老邁不堪者便不容納豈佛祖心行乎佛法至此掃地矣今日戒子請普説不覺葛藤至此為汝初機晚學當別邪正識是非不可因南面而認為知識也良以一人錯之於前多人效之於後遞相聾俗誠不可返山僧為汝點破生死事大不是兒戲努力殷勤莫空過日上來所説行持也在裡許警戒也在裡許具眼也在裡許了生死辦道業也在裡許復召衆云此身不向今生度更向何生度此生下座
