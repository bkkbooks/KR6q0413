body:
  text: 侍者行海録瑞鹿法孫行信編次入院上堂師至法座前拂坐具云大衆向者裡一肩擔當有甚麼難遂升座拈香祝聖罷又拈香云者些子前已三番泄露而今再四披宣令其未聞者聞未見者見熱向爐中專申供養象田堂上傳曹洞正宗第三十四世即念老和尚用酬法乳之恩乃就座維那白椎云法筵龍象衆當觀第一義師云今當八月二十五妙濟擊動虛空鼓十方世界一齊聞免得昭公道遍普山僧竭力為法門信手拈來俱是土前壁倒渠修後壁崩渠補瓦礫翻成帝釋宮草木叢林咸起舞一舞舞到兜率陀天驚得主空神主風神奔競無門連聲叫苦良久云休叫苦此是衲僧之莽鹵喝一喝維那再白椎云諦觀法王法法王法如是下座重陽日石林上座請上堂一處淨時處處淨九月九日重陽令一處垢時處處垢説法升堂成漏逗衲僧獨脫兩重關到處從緣獅子吼召衆云還有獨脫者麼衆無語師良久云不見道一心不生萬法無咎下座結制上堂維那問大冶爐韝烹佛烹祖惡辣鉗錘煆聖煆凡秪如個鐵額銅頭的人到來又作麼生師云趁出三門外進云為甚如此師云自首免罪進云恁麼則妙濟堂前遭點額翻身湧浪出蛟門師便打那便喝師又打云再𨁝跳看那云早已露布了也師復打乃云諸方今日結制個個説寒道熱妙濟一味尋常不解費唇費舌火種頭邊本自然前後枯柴任我折滿瓶水煮地爐茶飲不飲兮從君悅若還向外打之繞分明平地上喫跌不將間事挂心頭乃是山家第一訣下座送法衣至錦山觀音寺越峰徹公領居士請上堂老人信步出山遊倏爾金風體露秋糞掃堆頭燒黃葉杖藜撥出火柴頭驀拈拄杖云者個火柴頭從密印堂前分付已久老僧囑云住山燒這火柴頭行時踏這火柴頭動手捉這火柴頭示人擲出火柴頭徹公則依教奉行住山也燒過行時也踏過動手也捉過示人也擲過一擲擲向他方國土乃至四大部洲東洋大海外卻來陳白老僧老僧曰恭賀恭賀恰好恰好與麼為人庶不草草連卓拄杖下座出隊歸上堂僧問如何是祖師西來意師云眼上眉毛八字栽僧禮拜師乃云幾番去了幾番來眼上眉毛八字栽一一與君都説了何勞特地問西來下座霞山請上堂佛非佛心非心撥轉天關正眼親佛即心心即佛冷地看他是何物穿衣喫飯謂平常喚作平常又怎得既道平常總不然糞掃叢中堆荊棘荊棘堆頭夜神珠照天照地明歷歷薰菴主須委悉他日逢人謾拈出忽然拈出時如何黑漆漆元旦上堂拈香祝聖畢乃云舊年已過了新年無處躲新舊與去來同坑無異土擲拂子下座師誕日職事請上堂若論佛法向上則三世諸佛歷代祖師天下老和尚到這裡也須亡鋒結舌説生説滅説解脫説真如説佛祖説衆生總是平地上喫交若向下論則山林樹木草芥人畜鳶飛戾天魚躍於淵乃至十二類生一一具大作用放大光明助顯實相義如山僧去年生日也是者一日今年生日也是者一日明年生日也是者一日又作麼生論即今拜的拜賀的賀又是甚麼義還委悉麼良久云三世古今包不住何妨赤腳上天台僧問風恬浪靜絶無人知是個甚麼師云我亦如是子亦如是進云還得相續去麼師云又要從始起進云不相續但知有去去後又如何師云甕裡何曾走卻鱉僧禮拜師下座上堂昨夜有個師僧到今晨作別上天台為我傳句知心話寄信寒山拾得來大衆且道要二大老來做甚麼良久云我亦不知廣慧和尚至引座師云生平秪個知心友十載相分似夢場幸而法駕臨門也須知兩兩不成雙大衆既是兩兩為甚不成雙聻良久云問取本源和尚下座天童護國二和尚訃音至上堂一謂天童林一謂護國嘯一人教通禪一人禪通教宗教並拈提無處不驗到惜哉度世師法幢今已倒麈尾尖頭蛛網結法堂門前長青草因緣謝世是其時折合終歸炭裡好付四禪人衣拂上堂三十年來海上覓昨夜撞著四個賊和贓捉敗俱打翻各與三十齊趕出南天台北五臺東西南北從君適及至歸來白父知假鼠咬匱因繇説乃揮拂云不消説不消説綽綽有餘做得做得下座大悲菩薩誕日解制知浴明心請上堂百日期場方始解大悲今日受生時明公擬問源頭路白藕池邊栽一枝栽不栽即且止試問諸人如何是源頭路還是知浴打化為衆勞心是源頭路耶還是監院上香大衆作禮是源頭路耶若謂知浴打化為源頭路假饒盡大地是個檀那以那個為源頭路若化不著且喜沒交涉若謂監院燒香大衆作禮為源頭路秪如堂外燒火的燒火掃地的掃地送客的送客迎賓的迎賓擂鼓的擂鼓撞鐘的撞鐘處處是源頭路若摸索不著且喜沒交涉且道畢竟如何是源頭路聻擲拂子云橫身一擲是非外獨個間人天地間後堂問機前薦得絶廉纖離見離聞出蓋纏不用拈提并棒喝請師速道個中玄師云放子三十棒堂云龍門浪暖翻身過霹靂何曾透頂來師便打必成菴主領衆請上堂上首白椎竟師云第一義諦一椎粉碎了也一粉碎後便盡卻今時盡卻今時卻向那邊行履那邊行履時見天不是天見地不是地見山不是山見水不是水向那裡打個轉身卻向這邊行履見天依舊是天見地依舊是地見山依舊是山見水依舊是水正是溈山道這邊那邊應用不缺大衆且道作麼生甄別良久云鵝王擇乳素非鴨類必成問秪如大地無寸草且道水牯牛以何為食師云一日三食飽不休進云畢竟是甚麼食師豎拂子云我不欺汝進云恁麼則口吞佛祖眼蓋乾坤去也師云不信道成禮拜師下座上堂盡道萬法咸歸一據我觀來一也無家貧赤骨條條地渾身上下任摩挲摩挲不著處遍體生光遍體生光時摩挲無處所此事不惟山野如然則君亦如然臣亦如然智者亦如然愚者亦如然即今説者聽者一一如然若如然者也是若不如然者也是大衆如然者固是為甚麼不如然者也是良久云羿善射時無他力寡蕩行舟卻宛然擲拂子下座佛誕日為真念禪人披剃上堂出家本為無為法脫下藍衫著破衲莫謂修行不苦辛我也曾把辛苦踏朝也參兮暮也參四威儀中如是參參得萬念冷如灰個裡討個安心法但得心安身亦安夙種靈苗從此發更加四願以相資愍心再把衆生拔行一丈來説一尺十二時中當觀察念禪人且道觀察的是個甚麼良久云今朝是初八下座付臥雲禪人上堂披衣登法座識者合知歸問著曹源路君當為指揮遂授衣拂下座章婆子請上堂舉臺山婆子凡有僧問臺山路向甚麼處去婆云驀直去僧才行婆云好個師僧又恁去趙州聞云待我去勘破這老婆州如前問婆如前答州回謂衆云這老婆被我勘破了也師召衆云前後問答一般且道那裡是他勘破處聻衆無語師云未出門時先動棒猶然遲卻幾多時僧問勘破婆子即且置覿面提持事若何師云背後的一場懡㦬僧禮拜起云咦夜深不向蘆灣泊迥脫中間與兩頭師云氣急殺人下座結制上堂拈香云此一瓣香冤有頭債有主偶爾狹路相逢至今恨入骨髓熱向爐中供養象田堂上即念老和尚用酬法乳之恩斂衣就座僧問大開爐煹鋾鑄聖凡末後重關請師拈出師云但得雪消後自然春到來乃云盡道今日結制山僧今朝結舌結制與結舌是同還是別一二三四五六七七六五四三二一搕堆邊蘿蔔頭十字街前攤瓦礫擬心於此覓玄微管保驢年猶未徹喝一喝下座解制晚參僧問一句了然如何得脫塵離垢師云團團離海嶠漸漸出雲衢進云恁麼則蓋天蓋地去也師便打云不出山僧這一棒乃舉洞山云諸兄弟東去西去直須向萬里無寸草去有者道出門便是草又有道不出門亦是草芊芊地師云二尊宿恁麼答話未免落草山僧不解落草諸人不得草草要識洞山麼一句明明都説了行人莫與路為仇晚參僧問如何是大道師云恁麼大道僧無語師便打乃云大道只在目前要且目前難睹既在目前因甚麼難睹薰風自南來殿角生微涼因絶糧師密至湖中打化歸示衆鐵錘無孔向空拋多少時流陷寂寥大道若無過量者如何留得到今朝挂鐘板法語昨日有今朝今朝有昨日昨日與今朝切忌生分別莫分別板是木鐘是鐵輕輕擊著俱漏泄遂鳴示密嚴定書記南禪師住黃龍四十年坐鎮道場不動聲色今人住一破院逞僥幸爭人我遂使攪壞叢林分煙散衆有傷法門規範深望吾徒萬勿鹵莽近時學人有多種病捨迷求悟是病避喧求靜是病好名為人是病好利授人是病汝但一齊放下入荒田不檢草信手拈來卻好為善知識道眼清明透盡今古差別然後出世導人開口動舌翻人窠臼點人病根令人心悅誠服久則聲名流布寰宇浩歸湖海衲子望振佛祖之道夫復何難至誠之極可以感天地動鬼神始名道人或面是背非虛詞裝點從無一實非特不能感天地動鬼神秪恐人亦不足信矣為人師者不是細事自悟自説自行自了然後以斯道而覺斯民若説在一邊行在一邊非但不能自悟欲令人出世難矣哉上堂説法單提向上所為決了生死不曾教你鋪文理念詩章任汝年年念期期念念到臨末稍頭門下出了許多詩僧致使法門衰敗祖道寒涼殆將佛法掃地矣念詩章者罪過不少示石林起參頭佛法凋零人心膚淺少有一知半解打點為人再不忖己之才足不足德業充不充人品端不端一味希望付授貪名圖利使人人厭憎何益之有擔荷此事者原非小小一人悟道出世地神告報虛空神虛空神告報非非想天非非想天遞相告報下界有人得道有濟人分子能若是乎不則無益有損作之胡為慎之道人家直須一物不攀始似衲子氣宇若攀佛被佛礙攀祖被祖礙乃至攀禪道被禪道礙所以道上無攀仰下絶己躬佛祖禪道尚不許攀何況孜孜于貨利耶出家本是個無事人反生多事纍及身心山僧以直言告子能簞瓢隻杖破衲翛然有時雲行鳥飛於天地有時埋頭裹足於人間得不快哉出世弘道豈屬有心時節若至如水朝宗遮攔不住何得求繼聖道圖耀虛名討院開堂濫廁法位徒增笑具何益之有子肯抱道豎德三二十年待龍天推出自然馨香遍界比前強圖則霄壤矣天然羽公從北京封一白紙上師師接開笑謂來僧曰子行與我寄三十棒去即大書偈曰腳跟未動猶乖步萬里程途白紙來三十烏藤今贈子昔日同風且謾猜問答機緣僧問正恁來時如何師以拄杖左邊卓云走過這邊著進云不恁來時如何師以拄杖右邊卓云走過那邊著進云總不與麼來時如何師放下拄杖云速禮三拜師一日落堂見僧瞌睡師打云無見無聞無夢無想時主人公在甚麼處僧拍膝一下云在這裡師打云不是僧云且謾打待某甲再道師云速道僧云醒醒的直是醒醒瞌睡的直是瞌睡師復打云蹉過不少師問衆云乾屎橛作麼生會衆默然侍者以蒲團頂頭而出師休去師問僧甚麼物恁麼來僧云如人飲水冷暖自知師云知後如何僧云甚麼物恁麼來師云如人飲水冷暖自知僧問依然不改舊時人一句作麼生道師云那個舊時人僧擬議師云改了也僧問罪性不在內外中間在甚麼處師云不在內外中間僧問善財參遍處黑豆未生芽意旨如何師云縱橫不落有無機僧問不立階級的人如何接待師云朝打三千暮打八百一夜衆經行師伸足攔住云道道看衆無語師云彼此是隻腳為甚不會滄溟侍者問大千世界終歸毀壞且道世界壞時還有不壞的麼師云有進云那個不壞的師云鎮州蘿蔔頭僧問動者靜之基靜者動之本除卻動靜又將甚麼喚作基本師云逢人但恁麼舉問承師有言仲無臂手捏住天下人假若沒影的人來又作麼生捏師打云説得有理僧問從緣薦得相應疾聲未絶師翹足云薦薦看僧佇思師復問適才汝從那邊走來這邊會麼僧云不會師起身走三步復坐下云莫謂我瞞汝僧問那個是本來面目師仰身云眼閉腳直一晚衆進方丈開示畢將出師召云走來衆回首師云將謂別有那入室師問維那僧問雲門一念不生還有過也無雲門云須彌山意旨如何那云某但一念不生師云須彌山聻那禮拜起便喝師打云好一座須彌山僧云請師直指師以竹篦擢退云曲多少僧問一念未生前那個是學人自己師云一念未生前僧云畢竟那個是自己師云苦哉一僧忽跳下禪床叉手問云這是個甚麼道理師亦叉手云是這個道理一僧辭師師云途中善為僧云某甲參禪則不能途中善為師云也非分外僧云如何是分內事師以手指云驀直去僧便行師云當真那師問密契惠云有一物上拄天下拄地常在日用中日用中收不得且道是麼物惠作抖身勢云通身是遍身是師云雲門道扇子𨁝跳上三十三天汝作麼主會惠云拄杖子向和尚道了也師云拈卻拄杖子又道個甚麼惠便喝師便打僧參師問那裡來僧云湖廣師云黃梅近日有人麼僧云有一人只是不會這一著子師云如何是這一著子僧云即今舉似和尚師云放汝三十棒師問僧喚作是不得喚作非不得畢竟如何僧云某甲便恁麼去師云急走過僧問猛虎當路時如何師打云喪身失命師謂僧曰我莫打汝莫喝覿面提撕意若何僧便喝師打云為甚麼忘前失後師問裕之云不是心不是佛不是物是個甚麼裕云不識師云因甚不識裕云恐落諸數師又問狗子無佛性你作麼生會裕云殺人不用刀師云狗子有佛性聻裕云活人須用劍師又問我手何似佛手裕云切忌拏三道九師云我腳何似驢腳裕云逢人不得動著師云人人有個生緣作麼生是你的生緣裕便喝師便打云不得忘卻這一棒僧參師問那裡來僧云下路師云未動步時早喫三十棒也僧云恁麼與麼師打云恁麼與麼個甚麼僧便喝師亦喝因狗子在方丈內師問巨平云獅子窟中因甚麼有狗子平云現大人相師休去僧問如何是法身邊事師云破褲子如何是法身向上事師云不是破褲子僧才入門便問學人不問佛不問法不問僧不問向上不問向下師隨聲打云截斷葛藤僧不二參師云既是不二如何是一僧云不識師云還是識了不識不識不識僧云不識不識師熟視云不打自招必成菴主參師云聞汝悟道是否必云是師云試道看必拍案一下師云死了燒了又如何必曰和尚師云嗄必曰何曾燒卻聞普參才跨方丈門便喝師云性急作麼普遂展具師云不勞展具速道普云性急作麼師便喝普云和尚近日萬安師休去師問心白無夢無想無見無聞主人公在甚麼處白云劫火燒海底風鼓山相擊師云乾屎橛麻三斤庭前柏樹子作麼生會白云一串穿卻師云諸佛菩薩騾馬畜生都到那裡去了白云何處不稱尊師云鐘樓上念讚床腳下種菜意旨如何白云㗭唎囌嚕娑婆訶師云明日再來還有一道真言問你白拂袖便出師一日問望侍者不是心不是佛不是物是個甚麼望云撒手便歸去師云未在望云和尚又如何師云不是心不是佛不是物望遂有省云將謂有多少奇特師云且道有多少望拂袖云不要瞞我師云古人道後園驢喫草意旨如何望云門前江水流師云趙州道狗子佛性無又作麼生會望云這畜生師打云惡口傷人卍昱參師問雲門道扇子𨁝跳上三十三天汝作麼生會昱云東海鯉魚打一棒雨似盆傾師云佛法不是這個道理昱云和尚疑則退院別參師呵呵大笑昱問我宗無語句實無一法與人和尚作麼生主持師云你因甚刺腦入膠盆昱云請和尚另下一語師云意不任言來機亦赴昱禮拜師云好與三十棒心照問云正法眼藏親吞卻涅槃妙心付阿誰師云是甚麼人講恁麼話照云曹溪夜半春風急九朵曇花此夜開師云即今在甚麼處照躬身云這裡是甚麼所在師云舉似看照便喝師云老僧疑你這一喝照禮拜師休去茶次渠演問虛空包不住大地載不起時如何師云一口一盅演云恁麼則有意氣時添意氣不風流處也風流師云一口一盅作麼生會演云某甲是曹溪當家師云如何是當家一句演便喝師云且莫草草匆匆師問渠梵一念未生時如何梵云何不問某甲師云即今動問梵云若是別人即禍生師豎拳云你向這裡親切道將一句來梵云覿面相呈無回互師然之師問輥石狗子佛性是有是無石云一口無兩舌師云正睡著時有人低聲問你祖師西來意作麼生抵對石云古洞有龍吟出窟巖前木馬喊無形師云好與三十棒師問曇宣無夢無想正睡著有人問祖師西來意如何抵對宣云萬籟有聲聞不得孤巖無耳卻知音師問宇寬如何是你本來面目寬云好個高妙問頭只是無人答得師云我信你不及更道看寬云虛空跌落地處處是青天師豎拳云這個是甚麼寬云某甲不懸羊頭師云三十拄杖且待別時師問格新如何是你本來面目新云多蒙和尚提綱師云即今在甚麼處新云某甲不會注解師云一口氣不來向那裡安身立命新云金香爐下鐵崑崙師便休師問澄心趙州道狗子佛性無子作麼生會澄云合取口好師作掩耳勢澄便喝師云老僧被你一喝師問侍者老僧是何人你是那個者云同坑無異土師云我當拜你者無語師云老僧罪過師一日見僧出坡問曰出坡去麼僧云是師曰是個甚麼僧云出坡去師云壓殺闍黎一僧才入門師云未在僧云如何是在師云桑樹窠裡倒拔蛇僧問承聞我師有言有一句子分付諸人未審是那一句子師云忘記了僧擬議師打云莫妄想
