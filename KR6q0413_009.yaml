body:
  text: 侍者德瀾錄瑞鹿法孫行信編次附佛日雨老和尚書時師住密印每見人來知吾孫法道將隆兼能自愛不輕許可寔為我懷久久無倦不愁雲門佛法之不後耀也佛日禪眾俱精進兩堂共二百五十餘堂外亦二百五十餘兩堂首座一為革故易號大鼎一為遠門二俱老誠眾皆悅服完得一期或有一二可煆煉者不可知也復前別老人某心亦不捨依棲奈烏鎮鄉紳懇請之誠只得勉強從之進院以來無刻得暇不克問安為罪邇來法門混濫病諸輕授某決不輕意許可坐斷時流舌頭亦不苟圖安逸畢竟煆煉方來以報老人萬一恩也又附隱玉來知道場勝概又知吾孫為人真切能如是不輕許人不唯超我他日大起吾宗不可量哉止溪去既不清以事汝即事我故不責之今復不清而來故不擯而擯聽渠自愧若再至密印當略責而已如象田僧燒渠衣單覺太過也又復隱闍黎戒期勞他因初住不周待慢也期內禪眾總二百餘凡佛事陞座四眾不下萬餘可見佛法初與信心而使其然也止溪圭角太露某為之摹稜倒縫琢磨之止溪難當即飄然也和尚分付再來姑恕之象田僧粗糙非常人品不正戒律不通欲充尊證因某不命在期內作炒遂逐之並無燒衣之說乞和尚更察如虛責以誡之寄白龍水懷和尚書久不晤面夢寐時勤恩及深譚宛爾在昨起程匆匆不克細領教益為歉承訂法嗣之後懸懸在心近見人心不古觀其言未保其行有其行而無其才縱才德互行於此事難得徹透者得人之艱正為此也前遣二僧上天台有一靜主本源徹公向與弟為同參友此是抱道之士或仗兄慈光來時當明窗下安排則白龍宗風有賴也本公果嗣白龍寄本源和尚書既擔荷善知識之位寔非小小當寬以臨眾精以治己行一事可為天下法發一言可為天下則舉足動步如獅子王百獸見而潛藏哮吼一聲百獸腦裂若然者不說法而說已竟不行事而事已周非但叢林井井有條亦且眾心仰服行事推誠發言推重正是少出為貴少語為珍縱居闇室如對高賓兄若遵而行之非特報佛祖深恩亦且老人有賴予心樂矣白龍愈增光輝法門重添柱石觀兄氣品時節還未至切不可輕意鼓弄邇來人心輕浮動輒欺心學談聖賢之妙論履踐凡愚之劣行此是法門衰替之時欲要挽回深蓄厚養飽學深操事理兼備宗說俱通具獅子牙爪祖師巴鼻衲僧眼目缺一不可近有一種貿販之徒喫善知識飯行魔家事鎮日商量禪道佛法心心攀緣念念不住觸境生情造生死業撥著不知憤憤然胡打亂打問著不會悱悱然胡喝亂喝爭人兢我唐喪光陰輕慢好人以為具眼批判毀謗賢聖自謂總不及伊種種造業不可枚舉祖師東來有利有害正此之謂也吾兄當坐斷千差異路不得帶水拖泥落草盤桓不然則愈增魔業熾盛何益之有兄當甄別勿使流布若流布之名一出縱有超古之作不足信矣豈不見真點胸過章江政禪師之門一日摳衣露脛而過政問其故曰前廊後架俱是葛藤恐絆倒耳可見落草有時不一概論或閑暇之際從容論道觀其法器亦可陶成欺心狂禪切不可助彼之臆見如是提挈人正人觀之自親不肖者自退法道之興由此而至矣別雲松和尚書前承二紙得保無虞感也何如邇來法體想弗藥有喜也因攜杖匆匆竟違面別途中歉歉況此時景更不同也一味直心婆舌激切為人久久恐致招尤所以某負拂而長嘆者也衲子之家蕭然物外豈肯拘小節哉此去任緣他往未卜幾時再會此書作別鳥鎮撮爾之地不足為高良化導倘和尚別有定度又非其所知也臨行倉卒不盡所云與鐵幢禪人書細看汝行寔於中無大徹處故不意此際分付汝古人親師三二十年尚未盡其妙況今人浮淺猶不及古此一段大事豈可草草況汝年幼才德未充正好放下身心操履當割切速成之病根庶不墮旋蒸熱賣之醜態不可不慎別孔文在皜居士書前蒙手啟請山僧主持密印勉力承當寔非本意奈貴鎮宗風未到之地可與談者寥寥無幾惟吾子深相契合滿望為法門良器許久不來時勤懷念邇來銷金之口不一動則煩人因時景愈衰哲者知幾故爾攜杖他往恐雲水無期草此致別如不負我心他日披緇以佛門為歸計是山僧之萬望也寄廓朗兄書光陰迅速日月推遷拜別慈顏十有三載未發明時恐負出家之志不敢速返既少窺見又被法門事累故遙心眷想時復徒勞念先師塔事未曾入山兄等不及再晤何歉如之待世稍平即返鄉拜晤不盡與定隱鶴林茂公書粵中僧俗望善知識如大旱之望雲霓山僧一到如龍得水我已放心行道也合山耆舊眾等各各體心舉措合法六祖遺風猶在我只接墨而行毫不費力我之道緣意在斯乎特為子說各剎諸徒行道切宜兢惕不可濫付匪人減法門之光萬萬曹溪語錄先有八十餘張帶來在乳源清公處子同解公到譚樑老處求序文刻全錄全錄中俱以曹溪出名開堂數剎附在錄後送到楞嚴經房永垂不朽至緊至緊曹溪深山窮谷正是道人化導之所我不想回浙也子住持定隱方丈密宗是苦惱忠厚人子看我面上好好安頓使之少者懷而老者安則叢林不興而自興法道不振而自振子亦是老實人若心行不端者性情暴戾者俱不可留住我有未了之事盡在子了前分付兩三個老人家倘或不測俱造塔葬在定隱左右子到五十四五亦造一小塔錐在寺之直北想我今生不能來也將我之言且緩款不可說破令諸子動念所說幾件大事一一依我足見子始終厚情也懷旭長往為脩證說聲時中用心操履芥菴一枝全在他流通若避懶偷安不以法門為事者老僧作不肖論但要操履成人出世不出世聽憑龍天後無悔也即將此語轉為我門下開堂者說浙江乃獅子窟不得草草倘有壞事者白蓮方丈與定隱方丈懸老僧像鳴鼓集眾擯出法門外永不許為人二子既坐我方丈代我行道代我之言亦將此語傳入我眾門人耳或有不法之子擯過寫字到曹溪我方可刪去聯芳中偈語不可怕人見怪正是怕生怕死非丈夫不為法門非丈夫苟徒安逸非丈夫豈不見當言不言則失人也子一一依教奉行我在東方合掌讚嘆不盡全錄板送到楞嚴已將白蓮密印天華定隱玅濟并普說板一總發來曹溪經房流通以法濟東方也子到潯中將我所說一一代言安慰諸子勿使動念方可安心操履古人坐脫立亡全憑定力意識不行只為全身載道即垂手三界出生入死不被生死繫縛皆此等人佛法衰替時逢像季以貪嗔癡為戒定慧將爭人兢我竟作平常不知全身在生死裡還要高揮大抹瞞人自瞞只有一處瞞不得假若老苦臨身百骸將散要死不得死要活不得活那時叫天叫地四面無門悔之晚矣即善知識亦是虛名只要當人四稜踏地十二時中不自欺心豈不見心如墻壁方可入道有等狂禪見恁麼說便掩鼻而出子宜穩當把住莫受他惑九峰三遍出定灌溪七步而亡有七日而來者有擲筆而逝者有沐浴焚香別眾者有陞堂辭眾者說他不是得麼恐子不會再下個註腳上來尊宿恁麼自在皆是四相皆空五蘊不有二六時中不落意思信口便道信步便行直來直去不見有絲毫許佛法世法情塵愛念繫在心中便恁麼自在我在深山中老虎為伴正與諸禪子提唱此事亦常於此切也實要生生受用豈可掠虛耶從上佛祖亦如是古今知識亦如是老僧亦如是復望吾子亦如是不負靈山莂記也賀賀寄譚埽老先生書光陰如電日月如梭瞥轉眼時飆然異世喜台臺身不涉世善養天機胸懷廓落則包羅世出世間以古今未來之理事以筆尖頭點出耀古騰今山野亦深服焉曹溪仗六祖之餘光憨師之法則叢林尚井井有條人心幸而素朴奈久無法主者人人本有光明湮沒也山野一到合山如暗得燈不勝踴躍予遂舉筆云遺風猶在今冬開堂說戒來眾益多但隨力隨分亦不強圖乃道人之本分耳大師年譜一到合山大眾如饑渴之得飲食乞台臺將板發到曹溪永垂不朽如何山野曹溪拙錄先有八十餘張祈一統序以曹溪出名開堂諸剎之語附之錄後送到楞嚴寺經房久遠流通是荷寄錦山觀音寺越峰堂頭書我佛遺言千經萬典秪囑後弘法者以慈悲喜捨四無量心廣度眾生並不見有打罵擯斥而度眾末法之時只宜柔和善順而接物謙讓厚道而益人則自也安眾亦安叢林亦安如惡性比丘不服善者只可默擯而已若加以擯逐視如冤家則我與彼何殊何名善知識善知識能調物情自尚不能調其心性何能調物耶幸子道場相去山僧不遠事有決斷不下不妨過我請益凡事子只把大途瑣屑小事置之無聞正所謂不啞不聾難做阿家翁若件件責之以禮久久眾心不安便有參商閒暇接人之際不得帶水拖泥端居丈室律身清潔將日前所得所證一著子單提本分令人直下承當使後學有眼叢林有主是者還他是不得欺心瞞昧非者斥他非使有進趨分不可以非說是羅籠當世熱鬧門庭賤賣佛法亦不可以是說非欺心瞞昧使學者岐路亡羊若然智者日退不肖者日進法道焉能振作耶上堂說法切不可敘人情鋪文理人情文理乃世諦流布事不見題目就云當觀第一義擬議之間落七落八了也何況敘寒溫耶即方丈內尚不得說世諦況擊動法鼓諸天龍神俱來聽法寧無畏乎於陞座時直須胸中常坦坦無名無我無佛無祖目前無礙便如獅子哮吼也家常之法豐儉隨宜切不可以飲食哄小人住一犯此咎便非正經人正經人只貴道眼清明為人的當雖飲食菲薄何妨乎道若以豐衣飽食混帳過日有何益哉凡夫習氣同乎鼎沸縱一言一語相應於行履中未必相應於一切境界上著眼看他若逆順境界過不得便見生死宛然此人決定付法不得今有十宜以誠將來子宜珍重胸襟宜寬眼目宜明授人宜擇操行宜古處事宜長發言宜當臨眾宜容立身宜潔導人宜慈規諫宜聽守此十宜自然見處寬通受用廣大法道日隆災害日遠扶末世於將來弘吾道於今日是我之萬望也寄滄溟滿侍者書時師住定隱世間淺見之流觀起倒風聞氣色便曰某是某非皆是相時宜而後往前說惟老僧從前往後說當初執侍我時晝夜忘疲徹談為廣子見聞望為人耳何得自輕賤自泛濫耶烏鎮是子剃髮之地十聞而九指目焉豈可茆蓬自居使智者掩鼻當擇一明眼宗師終身依棲了子大事即我為子剃度訓導片片血心烏鎮到嘉興不遠竟不拜謁置之無聞五年也此一節是子不情況沒意氣無孝道忘仁義使我懸心看子大凡一切割然不肯轉頭況智眼不明志向暗短但不知去向何如耳千萬蕩去執情圓融無礙則事亦在其中理亦在其中仁亦在其中義亦在其中乃至終身結果盡在其中也或來不來其中意旨望子回音囑囑復潛菴座主書昨專使來聞知吾子出世明真甚喜但非老僧之本願子年輕才力未充恐徒氣力耳洙涇到此不遠不來白我輕意開堂似犯欲速之病自古大器決不小就若小就非法門之望不見道不鳴則已鳴則驚人不飛則已飛則沖霄況衲僧家上半生辛苦為己下半生慈仁為人若小菴小院小就譬若螢火之光太陽一出即掩耳老僧苦口非不助子懸望過我操履一番得大機顯大用那時放手百發百中也復定襄書記書昨子去後連日冒暑一病幾死邇來少愈起問吾子不在又添一種煩悶也子之行履滴水滴凍闔寺孰不知之為甚自跌大凡閒言冷語置之無聞無辯是大人之用心胡不知演祖之喫掌雲端之錯聽達師之無聞侍者之折足乎久而自明後說法利人機辯縱橫受用廣大光明炤映古今皆是含養工深道充德備返觀從前眾生乃諸佛之鉗錘耳吾子氣度聰俊似乎過人及至小小境界現前便過不得多年之用心自徒然了若背我不來到弄假成真也爾我是最契之師資今生不面耶不則速速過我以完初志能克苦工深六根自脫根塵一脫智慧朗然向朗然處說是不見其是謂證非是之是是道非不見其非謂斥非是之非非即三界中不過借路徑過何有拘絆于我哉即弘法利生也為繼其佛祖之制以待其人若以正眼觀之也是臘月扇子思之復落雲鏡菴西堂書語錄看畢內中有強用文理多說說話似乎不知利害浙中乃獅子窟不是兒戲以多為得只宜刪繁取要如天目禮虎丘隆不滿二十餘張自然大行于世所以說話不必多以驚人為最得人不必多以龍象為最此時法門草草師資反目皆因付時不的當故多過謬吾子是老成人只做老成事守定法門久住叢林不可輕意換院子時常過我以慰我心既得所又得人當好好安頓少者懷之老者安之則近者悅而遠者來則吾子安叢林安法門安老僧亦安心也囑囑寄巨平西堂書裕之來知吾徒開法圓通四眾欣然老僧亦增喜也此際世態非常切宜仔細安眾不必多但隨力隨分自然省力也時中安頓上下一眾和平則道在其中也垂手之際直心片片亦宜細心萬勿鹵莽久之勿倦以至誠心接待方來自然法道彌布矣復張總鎮書法名德愚兩辱惠臨深談衷曲至人德言別後馨香襲襲也幾欲恭候台臺佩念未獲申承喻興復煙雨隆嘉禾風輿之大觀深為勝舉愧山野德薄才涼不能企力即覓之眾中皆是捨事就理炷香究己之流於福緣事皆言留在悟後況人生在世如一大夢但於夢中作佛事即佛事亦好夢耳在乎智者識得破自跳得出也前台臺與山野徹談皆出世之因亦以夙植靈根於般若今現宰官身不昧本因兼之舉一明三目機銖兩別後山野時時欣慕再冀迴光扣己而參忽然摸著自己鼻孔方知推車共臂非他力陸地行舟事坦然臨楮不勝瞻仰又清晨跏趺摹想台前選佛休官古今希有見的淵深海闊胸襟某亦合掌讚嘆也某出世有年僧俗相交其數雖多似有太過不及吾道不行焉惟台臺善識時宜可謂俊極矣某入山脩道弘法利生若得台臺輔佐如鵬有翼也況如鏡對鏡光光相照世出世間不言自明正謂參禪須是英靈子學道還他大丈夫荷荷又暌違許久每切瞻依憶昔齊會今已易裘矣想台臺日來履福惠吉乎聞旌旗有高陞之喜將樹鉅鹿之功未審行裝吉時期在何日某欲恭賀麾前併祝不日凱歌之慶幸示一言為慰又日昨台駕光臨實不預聞褻慢也幸而知心人料不罪我亦冒雨而回使我神馳左右夜深伴燈細想尊意此時作宦不被宦累以弘法為心定靈山莂記兼以智眼圓明高明朗鑒仁慈育人領人銘刻是以某用遠見相待聚首深山者不忍將良器伴俗之類耳某意若是萬萬留神至囑至囑示孔文在皜居士書法名德皜昨日付囑汝後禪堂大眾個個歎息於中涕淚悲泣者五六人可見佛祖慧命利益人天正在此時山僧住密印半載內中契我心者寔鮮故我長歎息若如此出世利生有何益哉僧俗盤桓不下千餘望子久矣唯恐不能大翻身幸得個安樂處我心樂已故將佛祖慧命兩手分付亦是法門萬幸但居家抱道實不容易一切處當著精彩如珠混於淤泥弗使纖毫汙染于無汙染處亦能千變萬化應現諸塵實不與諸塵作對即名物外閒人此一行履從上諸聖若是山僧亦若是子亦若是即名以心印心傳佛慧命盡是此等人雖具如是作略亦不可稱性但恐中下之機又生退毀一生退毀則無益于人恐其無益山僧亦將高就下屈於自己口吞日月眼益乾坤之氣象何以故夫為善知識似天普蓋似地普擎風以時雨以時使其三草二木悉皆沾榮正是能利益中上下三根耳是名調御丈夫丈夫觀盡大地如赤子他人饑猶我饑他人苦猶我苦他人流落惡聚亦似我無異矣此名大慈大悲拔濟眾生今子分中似覺還少向後當依我言興慈運悲拔濟群迷若以世法禮儀而得度者即以世法禮儀而為說法若廣學多聞好辯論得度者即以廣學辯論而為說法若有卑劣之形者即垂手現卑劣而為說法如此三根普利則少合我心別後未久不覺叨咀我察眾心悲感交加特示寸楮以增法喜時中珍重
